        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <input value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&name.trim()){onCreate(name.trim());setName('');}}}
            placeholder="E.g. Tokyo 2025, Bali Conference…"
            style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--bd)',borderRadius:7,
              padding:'10px 14px',color:'var(--tx)',outline:'none',fontSize:14}}/>
          <button onClick={()=>{if(name.trim()){onCreate(name.trim());setName('');}}}
            disabled={!name.trim()} style={{width:'100%',padding:'10px',borderRadius:7,
              background:'var(--am)',color:'#1a0e00',fontWeight:700,fontSize:14,opacity:name.trim()?1:.45}}>
            Create Trip
          </button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',background:'var(--sf2)',borderRadius:8,border:'1px solid var(--bd)',
        padding:3,marginBottom:20}}>
        {[['trips',`Trips (${trips.length})`],['templates',`Templates (${(templates||[]).length})`]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:'8px',borderRadius:6,
            fontSize:13,fontWeight:600,transition:'all .15s',
            background:tab===v?'var(--sf3)':'transparent',
            color:tab===v?'var(--tx)':'var(--tx2)'}}>
            {l}
          </button>
        ))}
      </div>

      {/* Trips tab */}
      {tab==='trips'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
        {trips.length===0&&<div style={{textAlign:'center',color:'var(--tx3)',padding:'32px 0',fontSize:14}}>
          No trips yet — create one above.
        </div>}
        {trips.slice().sort((a,b)=>b.createdAt-a.createdAt).map(t=>{
          const tot=t.assignments.reduce((s,a)=>s+a.quantity,0);
          const pk=t.assignments.filter(a=>a.packed).reduce((s,a)=>s+a.quantity,0);
          const pct=tot>0?(pk/tot)*100:0;
          const isRenaming=renamingId===t.id;
          return <div key={t.id}
            style={{background:'var(--sf)',border:`1px solid ${isRenaming?'var(--am)':'var(--bd)'}`,
              borderRadius:10,padding:'15px 18px',display:'flex',alignItems:'center',gap:14,
              cursor:isRenaming?'default':'pointer',transition:'border-color .15s'}}
            onClick={()=>!isRenaming&&onSelect(t.id)}
            onMouseEnter={e=>{if(!isRenaming)e.currentTarget.style.borderColor='var(--am)';}}
            onMouseLeave={e=>{if(!isRenaming)e.currentTarget.style.borderColor='var(--bd)';}}>
            <div style={{flex:1,minWidth:0}}>
              {isRenaming
                ?<div style={{display:'flex',gap:8,marginBottom:8}} onClick={e=>e.stopPropagation()}>
                    <input value={renameVal} onChange={e=>setRenameVal(e.target.value)} autoFocus
                      onKeyDown={e=>{if(e.key==='Enter')saveRename(t.id);if(e.key==='Escape')setRenamingId(null);}}
                      style={{flex:1,background:'var(--sf2)',border:'1px solid var(--am)',borderRadius:6,
                        padding:'6px 10px',color:'var(--tx)',outline:'none',fontSize:14,fontWeight:600}}/>
                    <button onClick={()=>saveRename(t.id)} style={{padding:'6px 12px',borderRadius:6,
                      background:'var(--am)',color:'#1a0e00',fontWeight:700,fontSize:13}}>✓</button>
                    <button onClick={()=>setRenamingId(null)} style={{padding:'6px 10px',borderRadius:6,
                      background:'var(--sf2)',border:'1px solid var(--bd)',fontSize:13,color:'var(--tx2)'}}>✕</button>
                  </div>
                :<div style={{fontWeight:700,fontSize:15,marginBottom:3,
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
              }
              <div style={{fontSize:11,color:'var(--tx3)',marginBottom:9}}>
                {fmt(t.createdAt)} · {t.assignments.length} item type{t.assignments.length!==1?'s':''}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{flex:1,height:4,background:'var(--sf3)',borderRadius:2,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:2,width:`${pct}%`,
                    background:pct===100?'var(--gn)':'var(--am)',transition:'width .3s'}}/>
                </div>
                <span style={{fontSize:11,color:'var(--tx3)',flexShrink:0}}>{pk}/{tot} packed</span>
              </div>
            </div>
            {!isRenaming&&<>
              <button onClick={e=>{e.stopPropagation();setRenamingId(t.id);setRenameVal(t.name);}}
                title="Rename" style={{color:'var(--tx3)',fontSize:14,padding:'4px 8px',borderRadius:5,flexShrink:0}}
                onMouseEnter={e=>e.currentTarget.style.color='var(--am)'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--tx3)'}>✎</button>
              <button onClick={e=>{e.stopPropagation();onDuplicate(t.id);}}
                title="Duplicate" style={{color:'var(--tx3)',fontSize:13,padding:'4px 8px',borderRadius:5,flexShrink:0}}
                onMouseEnter={e=>e.currentTarget.style.color='var(--am)'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--tx3)'}>⧉</button>
              <button onClick={e=>{e.stopPropagation();confirm(`Delete "${t.name}"? This cannot be undone.`,()=>onDelete(t.id));}}
                style={{color:'var(--tx3)',fontSize:16,padding:'4px 8px',borderRadius:5,flexShrink:0}}
                onMouseEnter={e=>e.currentTarget.style.color='var(--rd)'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--tx3)'}>✕</button>
            </>}
          </div>;
        })}
      </div>}

      {/* Templates tab */}
      {tab==='templates'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>

        {/* New template form */}
        <div style={{background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:10,
          padding:'18px 20px'}}>
          <div className="bb" style={{fontSize:16,color:'var(--am)',marginBottom:12}}>New Template</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <input value={tplName} onChange={e=>setTplName(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&tplName.trim()){onCreateTemplate(tplName.trim());setTplName('');}}}
              placeholder="E.g. Business Trip, Beach Week…"
              style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--bd)',borderRadius:7,
                padding:'10px 14px',color:'var(--tx)',outline:'none',fontSize:14}}/>
            <button onClick={()=>{if(tplName.trim()){onCreateTemplate(tplName.trim());setTplName('');}}}
              disabled={!tplName.trim()} style={{width:'100%',padding:'10px',borderRadius:7,
                background:'var(--am)',color:'#1a0e00',fontWeight:700,fontSize:14,
                opacity:tplName.trim()?1:.45}}>
              Create Template
            </button>
          </div>
          <div style={{fontSize:11,color:'var(--tx3)',marginTop:10,lineHeight:1.5}}>
            Creates a blank template. Expand it below to add locations and items. Or build from a trip using <strong style={{color:'var(--tx)'}}>+ Save Template</strong> in the trip header.
          </div>
        </div>

        {templates&&templates.length>0&&<div style={{display:'flex',justifyContent:'flex-end'}}>
          <SortControl value={tplSort} onChange={setTplSort}/>
        </div>}

        {(!templates||templates.length===0)&&<div style={{textAlign:'center',color:'var(--tx3)',
          padding:'16px 0',fontSize:13}}>
          No templates yet — create one above.
        </div>}
        {(templates||[]).slice().sort((a,b)=>b.createdAt-a.createdAt).map(tpl=>(
          <TemplateCard key={tpl.id} tpl={tpl} trips={trips} sort={tplSort}
            onRename={name=>onRenameTemplate(tpl.id,name)}
            onRemoveItem={idx=>onRemoveTemplateItem(tpl.id,idx)}
            onUpdateQty={(idx,qty)=>onUpdateTemplateItemQty(tpl.id,idx,qty)}
            onAddItem={a=>onAddTemplateItem(tpl.id,a)}
            onDelete={()=>onDeleteTemplate(tpl.id)}
            onApplyToTrip={tripId=>onApplyTemplateToTrip(tpl.id,tripId)}
            onCreateAndApply={name=>onCreateTripAndApply(tpl.id,name)}/>
        ))}
      </div>}
    </div>
  </div>;
}

/* ── TEMPLATE MODALS ─────────────────────────────────────────────── */
function SaveTemplateModal({trip,onClose,onSave}){
  const assignCount=trip.assignments.length;
  return <Modal title="Save as Template" onClose={onClose}>
    <div style={{fontSize:12,color:'var(--tx2)',marginBottom:14}}>
      Saves all <strong style={{color:'var(--tx)'}}>{assignCount} item assignment{assignCount!==1?'s':''}</strong> from
      this trip — including which bag each item goes in and how many — as a reusable template.
    </div>
    <NameInput placeholder="E.g. Business Trip, Beach Week…" onSubmit={n=>{onSave(n);onClose();}}/>
  </Modal>;
}

function ApplyTemplateModal({templates,trip,onClose,onApply,onCreateAndApply}){
  const [creatingFor,setCreatingFor]=useState(null); // tpl.id
  const [newName,setNewName]=useState('');
  const newRef=useRef();
  useEffect(()=>{if(creatingFor)newRef.current?.focus();},[creatingFor]);

  if(!templates||templates.length===0) return <Modal title="Apply Template" onClose={onClose}>
    <div style={{color:'var(--tx2)',fontSize:13,textAlign:'center',padding:'20px 0'}}>
      No templates yet. Set up a trip and use "+ Save Template" to create one.
    </div>
  </Modal>;

  const locNames=new Set(trip.locations.map(l=>l.name.toLowerCase()));
  return <Modal title="Apply Template" onClose={onClose} w={440}>
    <div style={{fontSize:12,color:'var(--tx2)',marginBottom:16}}>
      Apply to this trip, or create a new one.
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {templates.slice().sort((a,b)=>b.createdAt-a.createdAt).map(tpl=>{
        const matchedLocs=new Set(tpl.assignments.map(a=>a.locationName));
        const matched=[...matchedLocs].filter(n=>locNames.has(n.toLowerCase()));
        const skipped=[...matchedLocs].filter(n=>!locNames.has(n.toLowerCase()));
        const isCreating=creatingFor===tpl.id;
        return <div key={tpl.id} style={{background:'var(--sf2)',border:'1px solid var(--bd)',
          borderRadius:9,padding:'12px 14px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:isCreating?10:0}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14}}>{tpl.name}</div>
              <div style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>
                {tpl.assignments.length} item{tpl.assignments.length!==1?'s':''}
                {matched.length>0&&<span style={{color:'var(--gn)'}}> · ✓ {matched.join(', ')}</span>}
                {skipped.length>0&&<span style={{color:'var(--tx3)'}}> · skipped: {skipped.join(', ')}</span>}
              </div>
            </div>
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              <button onClick={()=>{onApply(tpl.id);onClose();}}
                style={{padding:'6px 12px',borderRadius:7,background:'var(--am)',
                  color:'#1a0e00',fontWeight:700,fontSize:12}}>
                This Trip
              </button>
              <button onClick={()=>{setCreatingFor(isCreating?null:tpl.id);setNewName('');}}
                style={{padding:'6px 10px',borderRadius:7,fontSize:12,fontWeight:600,
                  background:'var(--am-bg)',border:'1px solid var(--am)',color:'var(--am)'}}>
                + New
              </button>
            </div>
          </div>
          {isCreating&&<div style={{display:'flex',gap:8}}>
            <input ref={newRef} value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{
                if(e.key==='Enter'&&newName.trim()){onCreateAndApply(tpl.id,newName.trim());onClose();}
                if(e.key==='Escape')setCreatingFor(null);
              }}
              placeholder="New trip name…"
              style={{flex:1,background:'var(--sf)',border:'1px solid var(--am)',borderRadius:7,
                padding:'8px 10px',color:'var(--tx)',outline:'none',fontSize:13}}/>
            <button onClick={()=>{if(newName.trim()){onCreateAndApply(tpl.id,newName.trim());onClose();}}}
              disabled={!newName.trim()}
              style={{padding:'8px 12px',borderRadius:7,background:'var(--am)',color:'#1a0e00',
                fontWeight:700,fontSize:13,opacity:newName.trim()?1:.45}}>
              Create
            </button>
          </div>}
        </div>;
      })}
    </div>
  </Modal>;
}

/* ── AUTH SCREEN ─────────────────────────────────────────────────── */
function AuthScreen(){
  const [mode,setMode]=useState('signin');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [message,setMessage]=useState('');
  const pwRef=useRef();

  const handle=async()=>{
    if(!email||!password)return;
    setLoading(true);setError('');setMessage('');
    try{
      if(mode==='signup'){
        const{error:e}=await sb.auth.signUp({email,password});
        if(e)throw e;
        setMessage('Check your email to confirm your account, then sign in.');
      }else{
        const{error:e}=await sb.auth.signInWithPassword({email,password});
        if(e)throw e;
      }
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  const forgotPassword=async()=>{
    if(!email){setError('Enter your email address above first.');return;}
    setLoading(true);setError('');
    const{error:e}=await sb.auth.resetPasswordForEmail(email);
    setLoading(false);
    if(e)setError(e.message);
    else setMessage('Password reset email sent — check your inbox.');
  };

  return <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',
    padding:40,paddingBottom:'calc(40px + env(safe-area-inset-bottom))'}}>
    <div style={{width:340}}>
      <div className="bb" style={{fontSize:76,color:'var(--am)',letterSpacing:6,lineHeight:1,
        marginBottom:8,textAlign:'center'}}>PACKR</div>
      <div style={{fontSize:14,color:'var(--tx2)',marginBottom:48,letterSpacing:.5,textAlign:'center'}}>
        Smart packing for smarter travellers
      </div>

      <div style={{background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:12,padding:24}}>
        <div style={{display:'flex',background:'var(--sf2)',borderRadius:7,
          border:'1px solid var(--bd)',padding:2,marginBottom:22}}>
          {[['signin','Sign In'],['signup','Sign Up']].map(([v,l])=>(
            <button key={v} onClick={()=>{setMode(v);setError('');setMessage('');}}
              style={{flex:1,padding:'6px',borderRadius:5,fontSize:13,fontWeight:600,
                background:mode===v?'var(--sf3)':'transparent',
                color:mode===v?'var(--tx)':'var(--tx2)'}}>
              {l}
            </button>
          ))}
        </div>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:'var(--tx3)',marginBottom:5,
            textTransform:'uppercase',letterSpacing:.7}}>Email</div>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&pwRef.current?.focus()} autoFocus
            style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--bd)',
              borderRadius:7,padding:'10px 12px',color:'var(--tx)',outline:'none'}}/>
        </div>
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:'var(--tx3)',marginBottom:5,
            textTransform:'uppercase',letterSpacing:.7}}>Password</div>
          <input ref={pwRef} type="password" value={password} onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handle()}
            style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--bd)',
              borderRadius:7,padding:'10px 12px',color:'var(--tx)',outline:'none'}}/>
        </div>

        {mode==='signin'&&<div style={{textAlign:'right',marginBottom:16}}>
          <button onClick={forgotPassword} disabled={loading}
            style={{fontSize:11,color:'var(--tx3)',padding:'2px 0',
              textDecoration:'underline',background:'none'}}>
            Forgot password?
          </button>
        </div>}
        {mode==='signup'&&<div style={{marginBottom:16}}/>}

        {error&&<div style={{color:'var(--rd)',fontSize:12,marginBottom:14,padding:'8px 10px',
          background:'rgba(240,82,82,.08)',borderRadius:6,border:'1px solid rgba(240,82,82,.2)'}}>
          {error}
        </div>}
        {message&&<div style={{color:'var(--gn)',fontSize:12,marginBottom:14,padding:'8px 10px',
          background:'rgba(63,214,138,.08)',borderRadius:6,border:'1px solid rgba(63,214,138,.2)'}}>
          {message}
        </div>}

        <button onClick={handle} disabled={loading||!email||!password}
          style={{width:'100%',padding:'11px',borderRadius:8,background:'var(--am)',
            color:'#1a0e00',fontWeight:700,fontSize:14,
            opacity:loading||!email||!password?'.45':'1'}}>
          {loading?'…':mode==='signin'?'Sign In':'Create Account'}
        </button>
      </div>
    </div>
  </div>;
}

/* ── APP ─────────────────────────────────────────────────────────── */
function App(){
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [dataLoading,setDataLoading]=useState(false);
  const [rowId,setRowId]=useState(null);
  const [trips,setTrips]=useState([]);
  const [templates,setTemplates]=useState([]);
  const [screen,setScreen]=useState('home');
  const [activeId,setActiveId]=useState(null);
  const [view,setView]=useState('board');
  const [drawerItem,setDrawerItem]=useState(null);
  const [pickerLoc,setPickerLoc]=useState(null);
  const [modal,setModal]=useState(null);
  const [saveStatus,setSaveStatus]=useState('idle'); // idle | saving | saved | error
  const loaded=useRef(false);
  const saveTimer=useRef(null);
  const lastSaved=useRef(null); // JSON snapshot of last successfully saved data

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user??null);
      setAuthLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user??null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!user){setTrips([]);setTemplates([]);setRowId(null);loaded.current=false;lastSaved.current=null;return;}
    setDataLoading(true);
    sb.from('packr_trips').select('id,data').eq('user_id',user.id).limit(1)
      .then(({data:rows,error})=>{
        if(error){console.error('Load failed:',error);setDataLoading(false);return;}
        if(rows&&rows.length>0){
          setRowId(rows[0].id);
          const trips=rows[0].data?.trips||[];
          const templates=rows[0].data?.templates||[];
          setTrips(trips);
          setTemplates(templates);
          // Snapshot what we just loaded so the save effect skips this initial state
          lastSaved.current=JSON.stringify({trips,templates});
        }
        setDataLoading(false);
        loaded.current=true;
      });
  },[user]);

  useEffect(()=>{
    if(!loaded.current||!user)return;
    // Skip if nothing actually changed since last save
    const snapshot=JSON.stringify({trips,templates});
    if(snapshot===lastSaved.current)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    setSaveStatus('saving');
    saveTimer.current=setTimeout(async()=>{
      try{
        const payload={user_id:user.id,data:{trips,templates},updated_at:new Date().toISOString()};
        if(rowId){
          const{error}=await sb.from('packr_trips').update(payload).eq('id',rowId);
          if(error)throw error;
        }else{
          const{data:row,error}=await sb.from('packr_trips').insert(payload).select('id').single();
          if(error)throw error;
          if(row)setRowId(row.id);
        }
        lastSaved.current=snapshot;
        setSaveStatus('saved');
        setTimeout(()=>setSaveStatus('idle'),2000);
      }catch(e){
        console.error('Save failed:',e);
        setSaveStatus('error');
      }
    },3000); // 3s debounce — imperceptible for packing, halves write frequency vs 1.5s
  },[trips,templates]);

  const signOut=()=>{
    sb.auth.signOut();
    setScreen('home');setActiveId(null);setDrawerItem(null);setPickerLoc(null);
    loaded.current=false;lastSaved.current=null;
  };

  const trip=trips.find(t=>t.id===activeId)||null;
  const mut=fn=>setTrips(ts=>ts.map(t=>t.id===activeId?fn(t):t));

  const addTrip=name=>{const t=mkTrip(name);setTrips(ts=>[...ts,t]);setActiveId(t.id);setScreen('trip');setView('board');};
  const delTrip=id=>{setTrips(ts=>ts.filter(t=>t.id!==id));if(activeId===id){setActiveId(null);setScreen('home');}};
  const renameTrip=(id,name)=>setTrips(ts=>ts.map(t=>t.id===id?{...t,name}:t));
  const duplicateTrip=id=>{
    const src=trips.find(t=>t.id===id);
    if(!src)return;
    // Duplicate with new IDs but same structure, reset packed status, name gets " (copy)"
    const idMap={};
    const newLocs=src.locations.map(l=>{const nid=genId();idMap[l.id]=nid;return{...l,id:nid};});
    const itemIdMap={};
    const newItems=src.items.map(i=>{const nid=genId();itemIdMap[i.id]=nid;return{...i,id:nid};});
    const newAssignments=src.assignments.map(a=>({
      ...a,id:genId(),
      itemId:itemIdMap[a.itemId]||a.itemId,
      locationId:idMap[a.locationId]||a.locationId,
      packed:false,
    }));
    const dup={...src,id:genId(),name:src.name+' (copy)',createdAt:Date.now(),
      locations:newLocs,items:newItems,assignments:newAssignments};
    setTrips(ts=>[...ts,dup]);
  };

  const addLoc=name=>mut(t=>({...t,locations:[...t.locations,
    {id:genId(),name,color:LOC_COLORS[t.locations.length%LOC_COLORS.length],bagWeight:0}]}));
  const delLoc=id=>{
    mut(t=>({...t,locations:t.locations.filter(l=>l.id!==id),
      assignments:t.assignments.filter(a=>a.locationId!==id)}));
  };
  const renameLoc=(id,name)=>mut(t=>({...t,locations:t.locations.map(l=>l.id===id?{...l,name}:l)}));
  const renameItem=(id,name)=>mut(t=>({...t,items:t.items.map(i=>i.id===id?{...i,name}:i)}));
  const setItemWeight=(id,weight)=>mut(t=>({...t,items:t.items.map(i=>i.id===id?{...i,weight}:i)}));
  const setLocBagWeight=(id,bagWeight)=>mut(t=>({...t,locations:t.locations.map(l=>l.id===id?{...l,bagWeight}:l)}));
  const delItem=id=>mut(t=>({...t,items:t.items.filter(i=>i.id!==id),assignments:t.assignments.filter(a=>a.itemId!==id)}));
  const resetPacked=()=>mut(t=>({...t,assignments:t.assignments.map(a=>({...a,packed:false}))}));
  const reorderAssignment=(locationId,fromId,toId)=>mut(t=>{
    const all=[...t.assignments];
    const fi=all.findIndex(a=>a.id===fromId);
    if(fi===-1)return t;
    // __bottom__: move dragged item to after the last unpacked item in this location
    if(toId==='__bottom__'){
      const[moved]=all.splice(fi,1);
      // Find last unpacked item in this location
      const lastUnpackedIdx=all.reduce((last,a,i)=>
        a.locationId===locationId&&!a.packed?i:last,-1);
      all.splice(lastUnpackedIdx+1,0,moved);
      return{...t,assignments:all};
    }
    const ti=all.findIndex(a=>a.id===toId);
    if(ti===-1||fi===ti)return t;
    const[moved]=all.splice(fi,1);
    const insertAt=fi<ti?ti-1:ti;
    all.splice(insertAt,0,moved);
    return{...t,assignments:all};
  });

  // Templates
  const saveTemplate=(name)=>{
    if(!trip)return;
    const assignments=trip.assignments.map(a=>{
      const item=trip.items.find(i=>i.id===a.itemId);
      const loc=trip.locations.find(l=>l.id===a.locationId);
      return item&&loc?{itemName:item.name,itemCategory:item.category,itemWeight:item.weight??200,
        locationName:loc.name,quantity:a.quantity}:null;
    }).filter(Boolean);
    setTemplates(ts=>[...ts,{id:genId(),name,createdAt:Date.now(),assignments}]);
  };
  const createTemplate=name=>setTemplates(ts=>[...ts,{id:genId(),name,createdAt:Date.now(),assignments:[]}]);
  const delTemplate=id=>setTemplates(ts=>ts.filter(t=>t.id!==id));
  const renameTemplate=(id,name)=>setTemplates(ts=>ts.map(t=>t.id===id?{...t,name}:t));
  const removeTemplateItem=(templateId,idx)=>setTemplates(ts=>ts.map(t=>
    t.id===templateId?{...t,assignments:t.assignments.filter((_,i)=>i!==idx)}:t));
  const updateTemplateItemQty=(templateId,idx,qty)=>setTemplates(ts=>ts.map(t=>
    t.id===templateId?{...t,assignments:t.assignments.map((a,i)=>i===idx?{...a,quantity:qty}:a)}:t));
  const addTemplateItem=(templateId,assignment)=>setTemplates(ts=>ts.map(t=>
    t.id===templateId?{...t,assignments:[...t.assignments,assignment]}:t));
  const applyTemplate=(templateId,targetTripId)=>{
    const tpl=templates.find(t=>t.id===templateId);
    const tid=targetTripId||activeId;
    if(!tpl||!tid)return;
    setTrips(ts=>ts.map(t=>{
      if(t.id!==tid)return t;
      let{items,locations,assignments}=t;
      tpl.assignments.forEach(({itemName,itemCategory,itemWeight,locationName,quantity})=>{
        const loc=locations.find(l=>l.name.toLowerCase()===locationName.toLowerCase());
        if(!loc)return;
        let item=items.find(i=>i.name.toLowerCase()===itemName.toLowerCase());
        if(!item){item={id:genId(),name:itemName,category:itemCategory,weight:itemWeight};items=[...items,item];}
        const exists=assignments.find(a=>a.itemId===item.id&&a.locationId===loc.id);
        if(!exists)assignments=[...assignments,{id:genId(),itemId:item.id,locationId:loc.id,quantity,packed:false}];
      });
      return{...t,items,assignments};
    }));
  };

  // Create a new trip and apply a template to it atomically, then navigate into it
  const createTripAndApply=(templateId,tripName)=>{
    const tpl=templates.find(t=>t.id===templateId);
    const newTrip=mkTrip(tripName);
    if(tpl){
      let{items,locations,assignments}=newTrip;
      tpl.assignments.forEach(({itemName,itemCategory,itemWeight,locationName,quantity})=>{
        const loc=locations.find(l=>l.name.toLowerCase()===locationName.toLowerCase());
        if(!loc)return;
        let item=items.find(i=>i.name.toLowerCase()===itemName.toLowerCase());
        if(!item){item={id:genId(),name:itemName,category:itemCategory,weight:itemWeight};items=[...items,item];}
        const exists=assignments.find(a=>a.itemId===item.id&&a.locationId===loc.id);
        if(!exists)assignments=[...assignments,{id:genId(),itemId:item.id,locationId:loc.id,quantity,packed:false}];
      });
      newTrip.items=items;newTrip.assignments=assignments;
    }
    setTrips(ts=>[...ts,newTrip]);
    setActiveId(newTrip.id);setScreen('trip');setView('board');
    setDrawerItem(null);setPickerLoc(null);
  };

  const setAssign=(itemId,locationId,quantity)=>mut(t=>{
    if(quantity<=0)return{...t,assignments:t.assignments.filter(a=>!(a.itemId===itemId&&a.locationId===locationId))};
    const ex=t.assignments.find(a=>a.itemId===itemId&&a.locationId===locationId);
    if(ex)return{...t,assignments:t.assignments.map(a=>a.itemId===itemId&&a.locationId===locationId?{...a,quantity}:a)};
    return{...t,assignments:[...t.assignments,{id:genId(),itemId,locationId,quantity,packed:false}]};
  });
  const togPacked=(itemId,locationId)=>mut(t=>({...t,
    assignments:t.assignments.map(a=>a.itemId===itemId&&a.locationId===locationId?{...a,packed:!a.packed}:a)}));

  const goHome=()=>{setScreen('home');setDrawerItem(null);setPickerLoc(null);};
  const openTrip=id=>{setActiveId(id);setScreen('trip');setDrawerItem(null);setPickerLoc(null);setView('board');};
  const activeItem=trip?.items.find(i=>i.id===drawerItem);
  const pickerLocObj=trip?.locations.find(l=>l.id===pickerLoc);

  if(authLoading)return <LoadingScreen/>;
  if(!user)return <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)'}}><AuthScreen/></div>;
  if(dataLoading)return <LoadingScreen message="Loading your trips…"/>;

  return <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)'}}>

    {screen==='home'&&<>
      <div style={{display:'flex',alignItems:'center',padding:'0 16px',height:54,
        background:'var(--sf)',borderBottom:'1px solid var(--bd)',flexShrink:0}}>
        <div className="bb" style={{fontSize:24,color:'var(--am)',letterSpacing:3,flex:1}}>PACKR</div>
        <SaveIndicator status={saveStatus}/>
        <DisplayName user={user} onUpdate={u=>setUser(u)}/>
        <button onClick={signOut} style={{fontSize:12,color:'var(--tx3)',padding:'5px 10px',
          borderRadius:6,border:'1px solid var(--bd)',background:'var(--sf2)',marginLeft:8,flexShrink:0,whiteSpace:'nowrap'}}>
          Sign out
        </button>
      </div>
      <HomeScreen trips={trips} templates={templates} onCreate={addTrip} onSelect={openTrip}
        onDelete={delTrip} onRename={renameTrip} onDuplicate={duplicateTrip}
        onDeleteTemplate={delTemplate}
        onRenameTemplate={renameTemplate}
        onRemoveTemplateItem={removeTemplateItem}
        onUpdateTemplateItemQty={updateTemplateItemQty}
        onAddTemplateItem={addTemplateItem}
        onCreateTemplate={createTemplate}
        onCreateTripAndApply={createTripAndApply}
        onApplyTemplateToTrip={(templateId,tripId)=>{
          setActiveId(tripId);
          applyTemplate(templateId,tripId);
          openTrip(tripId);
        }}/>
    </>}

    {screen==='trip'&&trip&&<>
      <TripHeader trip={trip} onHome={goHome}
        onRename={name=>renameTrip(activeId,name)}
        onSignOut={signOut} user={user} onUpdateUser={u=>setUser(u)}
        onSaveTemplate={()=>setModal({type:'save-template'})}
        onApplyTemplate={()=>setModal({type:'apply-template'})}
        saveStatus={saveStatus}
        view={view} onView={setView}/>
      {view==='board'
        ?<Board trip={trip}
            onAdd={id=>setPickerLoc(id)}
            onToggle={togPacked} onQty={setAssign}
            onOpen={id=>setDrawerItem(id)}
            onAddLoc={()=>setModal({type:'add-loc'})}
            onRenameLoc={id=>setModal({type:'rename-loc',id})}
            onSetBagWeight={id=>setModal({type:'set-bag-weight',id})}
            onDelLoc={delLoc}
            onReorder={reorderAssignment}/>
        :<Summary trip={trip} onResetPacked={resetPacked}/>
      }

      {activeItem&&<ItemDrawer item={activeItem} locations={trip.locations}
        assignments={trip.assignments.filter(a=>a.itemId===activeItem.id)}
        onClose={()=>setDrawerItem(null)}
        onQty={(locId,qty)=>setAssign(activeItem.id,locId,qty)}
        onToggle={locId=>togPacked(activeItem.id,locId)}
        onRename={name=>renameItem(activeItem.id,name)}
        onSetWeight={w=>setItemWeight(activeItem.id,w)}
        onDel={()=>{delItem(activeItem.id);setDrawerItem(null);}}/>}

      {pickerLocObj&&<Picker items={trip.items} assignments={trip.assignments}
        locId={pickerLoc} loc={pickerLocObj}
        onClose={()=>setPickerLoc(null)}
        onSelect={itemId=>{setAssign(itemId,pickerLoc,1);setPickerLoc(null);setDrawerItem(itemId);}}
        onCreateAdd={(name,category,weight)=>{
          const nid=genId();
          mut(t=>({...t,
            items:[...t.items,{id:nid,name,category:category||'Custom',weight:weight||200}],
            assignments:[...t.assignments,{id:genId(),itemId:nid,locationId:pickerLoc,quantity:1,packed:false}],
          }));
          setPickerLoc(null);setDrawerItem(nid);
        }}/>}

      {modal?.type==='add-loc'&&<Modal title="Add Location" onClose={()=>setModal(null)}>
        <NameInput placeholder="E.g. Hotel Safe" onSubmit={n=>{addLoc(n);setModal(null);}}/>
      </Modal>}
      {modal?.type==='rename-loc'&&<Modal title="Rename Location" onClose={()=>setModal(null)}>
        <NameInput defVal={trip.locations.find(l=>l.id===modal.id)?.name||''}
          onSubmit={n=>{renameLoc(modal.id,n);setModal(null);}}/>
      </Modal>}
      {modal?.type==='set-bag-weight'&&trip&&(()=>{
        const loc=trip.locations.find(l=>l.id===modal.id);
        return <BagWeightModal loc={loc} onClose={()=>setModal(null)}
          onSave={w=>{setLocBagWeight(modal.id,w);setModal(null);}}/>;
      })()}
      {modal?.type==='save-template'&&trip&&
        <SaveTemplateModal trip={trip} onClose={()=>setModal(null)} onSave={saveTemplate}/>}
      {modal?.type==='apply-template'&&trip&&
        <ApplyTemplateModal templates={templates} trip={trip}
          onClose={()=>setModal(null)} onApply={applyTemplate}
          onCreateAndApply={(tplId,name)=>createTripAndApply(tplId,name)}/>}
    </>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
