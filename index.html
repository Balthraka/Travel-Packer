<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1419;--sf:#192130;--sf2:#1f2b3e;--sf3:#283649;
  --bd:#2b3c52;--tx:#ccd8e6;--tx2:#6e87a3;--tx3:#3e5572;
  --am:#f5a623;--am-bg:rgba(245,166,35,.1);--gn:#3fd68a;--rd:#f05252;
}
html,body,#root{height:100%;background:var(--bg)}
@supports (height:100dvh){html,body,#root{height:100dvh;}}
body{font-family:'Outfit',sans-serif;color:var(--tx);font-size:14px;line-height:1.4;overflow:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;line-height:1}
input,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:2px}
.bb{font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px}
@keyframes chk{0%{transform:scale(1.5)}100%{transform:scale(1)}}
@keyframes slR{from{transform:translateX(380px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fdU{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fd{from{opacity:0}to{opacity:1}}

/* ── BOARD MOBILE ── */
.board-container{
  display:flex;gap:16px;padding:16px;
  overflow-x:auto;overflow-y:hidden;
  align-items:stretch;flex:1;
  -webkit-overflow-scrolling:touch;
}
.loc-col{
  width:274px;flex-shrink:0;background:var(--sf);
  border:1px solid var(--bd);border-radius:10px;
  display:flex;flex-direction:column;height:100%;overflow:hidden;
}
.drawer-panel{
  position:fixed;right:0;top:0;bottom:0;width:358px;
  background:var(--sf);border-left:1px solid var(--bd);
  z-index:201;display:flex;flex-direction:column;
  animation:slR .25s ease;
}
/* desktop-only header buttons */
.hdr-desktop{display:flex;align-items:center;gap:8px;}
.hdr-mobile-menu{display:none;}

@media(max-width:768px){
  .board-container{
    padding:10px;gap:10px;
    scroll-snap-type:x mandatory;
    scroll-padding:10px;
  }
  .loc-col{
    width:calc(100vw - 32px) !important;
    min-width:calc(100vw - 32px);
    scroll-snap-align:start;
    scroll-snap-stop:always;
  }
  .drawer-panel{
    width:100vw !important;
    border-left:none !important;
  }
  .hdr-desktop{display:none !important;}
  .hdr-mobile-menu{display:flex !important;align-items:center;gap:8px;}
  .board-add-loc{
    min-width:calc(100vw - 32px) !important;
    scroll-snap-align:start;
  }
  .mob-dots{display:flex !important;}
}
.mob-dots{display:none;}

/* ── SAFE AREA (Android gesture bar / iPhone home indicator) ── */
@supports (padding-bottom: env(safe-area-inset-bottom)){
  .board-container{
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
  }
  @media(max-width:768px){
    .board-container{
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }
    .mob-dots{
      padding-bottom: calc(4px + env(safe-area-inset-bottom));
    }
  }
  .drawer-panel-footer{
    padding-bottom: calc(14px + env(safe-area-inset-bottom)) !important;
  }
}

@media print{
  .np{display:none!important}
  html,body{overflow:visible!important;height:auto!important;background:white!important}
  #root{height:auto!important;overflow:visible!important}
  .print-scroll{overflow:visible!important;height:auto!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>

const fmtW = g => {
  if (g === 0) return '0g';
  if (g < 1000) return `${g}g`;
  const kg = g / 1000;
  return `${kg % 1 === 0 ? kg.toFixed(0) : kg.toFixed(1)}kg`;
};

const mkTrip = name => ({
  id:genId(), name, createdAt:Date.now(),
  locations: DEFAULT_LOCS.map(l=>({...l,id:genId()})),
  items: ITEM_TPLS.map(([n,c,w])=>({id:genId(),name:n,category:c,weight:w})),

/* ── PRIMITIVES ──────────────────────────────────────────────────── */
function Veil({onClick,alpha=.55}){
  return <div onClick={onClick} style={{position:'fixed',inset:0,
    background:`rgba(0,0,0,${alpha})`,zIndex:200,animation:'fd .15s ease'}}/>;
}

function Modal({title,onClose,children,w=380}){
  return <>
    <Veil onClick={onClose}/>
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
      width:w,maxWidth:'94vw',maxHeight:'84vh',overflowY:'auto',
      background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:12,padding:24,
      zIndex:201,animation:'fdU .2s ease',boxShadow:'0 24px 64px rgba(0,0,0,.65)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div className="bb" style={{fontSize:22,color:'var(--am)'}}>{title}</div>
        <button onClick={onClose} style={{color:'var(--tx2)',fontSize:20,padding:'2px 6px'}}>✕</button>
      </div>
      {children}
    </div>
  </>;
}

function Confirm({message,onConfirm,onCancel,danger=true}){
  return <>
    <Veil onClick={onCancel} alpha={.6}/>
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
      width:320,maxWidth:'90vw',background:'var(--sf)',border:'1px solid var(--bd)',
      borderRadius:12,padding:24,zIndex:202,boxShadow:'0 24px 64px rgba(0,0,0,.7)',
      animation:'fdU .18s ease'}}>
      <div style={{fontSize:14,color:'var(--tx)',marginBottom:20,lineHeight:1.5}}>{message}</div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={onCancel} style={{flex:1,padding:'9px',borderRadius:7,
          background:'var(--sf2)',border:'1px solid var(--bd)',fontSize:13,color:'var(--tx2)'}}>
          Cancel
        </button>
        <button onClick={onConfirm} style={{flex:1,padding:'9px',borderRadius:7,fontSize:13,
          fontWeight:700,background:danger?'rgba(240,82,82,.15)':'var(--am)',
          border:danger?'1px solid rgba(240,82,82,.4)':'none',
          color:danger?'var(--rd)':'#1a0e00'}}>
          Confirm
        </button>
      </div>
    </div>
  </>;
}

function useConfirm(){
  const [state,setState]=useState(null);
  const ask=(message,onConfirm,danger=true)=>setState({message,onConfirm,danger});
  const el=state?<Confirm message={state.message} danger={state.danger}
    onConfirm={()=>{state.onConfirm();setState(null);}}
    onCancel={()=>setState(null)}/>:null;
  return{ask,el};
}

function NameInput({placeholder,defVal='',onSubmit}){
  const [v,setV]=useState(defVal);
  const r=useRef();
  useEffect(()=>{r.current?.focus();r.current?.select();},[]);
  const go=()=>v.trim()&&onSubmit(v.trim());
  return <div style={{display:'flex',gap:8}}>
    <input ref={r} value={v} onChange={e=>setV(e.target.value)}
      onKeyDown={e=>e.key==='Enter'&&go()} placeholder={placeholder}
      style={{flex:1,background:'var(--sf2)',border:'1px solid var(--bd)',borderRadius:7,
        padding:'9px 12px',color:'var(--tx)',outline:'none'}}/>
    <button onClick={go} disabled={!v.trim()} style={{background:'var(--am)',color:'#1a0e00',
      borderRadius:7,padding:'9px 18px',fontWeight:700,fontSize:13,opacity:v.trim()?1:.4}}>Save</button>
  </div>;
}

function Qty({value,onChange}){
  return <div style={{display:'flex',alignItems:'center',gap:4,userSelect:'none',flexShrink:0}}>
    <button onClick={()=>onChange(Math.max(0,value-1))}
      style={{width:24,height:24,borderRadius:5,background:'var(--sf3)',
        fontSize:17,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
    <span style={{width:22,textAlign:'center',fontSize:13,fontWeight:600}}>{value}</span>
    <button onClick={()=>onChange(Math.min(20,value+1))}
      style={{width:24,height:24,borderRadius:5,background:'var(--sf3)',
        fontSize:17,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
  </div>;
}

function PackBox({packed,onChange}){
  const [pop,setPop]=useState(false);
  const handle=()=>{if(!packed){setPop(true);setTimeout(()=>setPop(false),300);}onChange();};
  return <button onClick={handle} style={{width:26,height:26,borderRadius:6,flexShrink:0,
    border:`2px solid ${packed?'var(--gn)':'var(--sf3)'}`,
    background:packed?'var(--gn)':'transparent',color:'#fff',
    fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',
    transition:'all .15s',animation:pop?'chk .25s ease':'none'}}>
    {packed?'✓':''}
  </button>;
}

/* ── ITEM CARD (board) ───────────────────────────────────────────── */
function ItemCard({item,a,locColor,onToggle,onQty,onOpen}){
  return <div style={{background:a.packed?`${locColor}0c`:'var(--sf2)',
    border:`1px solid ${a.packed?locColor+'38':'var(--bd)'}`,
    borderRadius:8,padding:'9px 11px',display:'flex',alignItems:'center',gap:10,
    transition:'all .2s',opacity:a.packed?.58:1}}>
    <PackBox packed={a.packed} onChange={onToggle}/>
    <span onClick={onOpen} style={{flex:1,fontSize:13,fontWeight:500,cursor:'pointer',
      textDecoration:a.packed?'line-through':'none',color:'var(--tx)'}}>
      {item.name}
    </span>
    <Qty value={a.quantity} onChange={onQty}/>
  </div>;
}

/* ── LOCATION COLUMN ─────────────────────────────────────────────── */
function LocCol({loc,items,assignments,onAdd,onToggle,onQty,onOpen,onRename,onSetBagWeight,onDel}){
  const [menu,setMenu]=useState(false);
  const mRef=useRef();
  const{ask:confirm,el:confirmEl}=useConfirm();
  useEffect(()=>{
    if(!menu)return;
    const fn=e=>{if(!mRef.current?.contains(e.target))setMenu(false);};
    document.addEventListener('mousedown',fn);
    return()=>document.removeEventListener('mousedown',fn);
  },[menu]);

  const la=assignments.filter(a=>a.locationId===loc.id);
  const total=la.reduce((s,a)=>s+a.quantity,0);
  const packed=la.filter(a=>a.packed).reduce((s,a)=>s+a.quantity,0);
  const pct=total>0?packed/total:0;
  const done=total>0&&packed===total;
  const sorted=[...la].sort((a,b)=>(a.packed?1:0)-(b.packed?1:0));

  const bagW = loc.bagWeight ?? 0;
  const contentsW = la.reduce((s,a)=>{ const item=items.find(i=>i.id===a.itemId); return s+(item?.weight??200)*a.quantity; },0);
  const totalW = bagW + contentsW;

  return <div className="loc-col" style={{borderTop:`3px solid ${loc.color}`}}>
    {confirmEl}
    <div style={{padding:'12px 12px 10px',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <div className="bb" style={{fontSize:18,color:loc.color,letterSpacing:2}}>{loc.name}</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--tx)',fontFamily:'Outfit,sans-serif'}}>~{fmtW(totalW)}</div>
            {bagW>0&&<div style={{fontSize:9,color:'var(--tx3)',lineHeight:1}}>bag: {fmtW(bagW)}</div>}
          </div>
          <div style={{position:'relative'}} ref={mRef}>
            <button onClick={()=>setMenu(m=>!m)}
              style={{color:'var(--tx3)',fontSize:19,padding:'1px 5px',borderRadius:4,
                background:menu?'var(--sf3)':'transparent'}}>⋯</button>
            {menu&&<div style={{position:'absolute',right:0,top:'calc(100% + 4px)',
              background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:8,
              zIndex:20,width:168,boxShadow:'0 10px 28px rgba(0,0,0,.55)',overflow:'hidden'}}>
              <button onClick={()=>{onRename();setMenu(false);}}
                style={{display:'block',width:'100%',padding:'9px 14px',fontSize:13,color:'var(--tx)',textAlign:'left'}}>Rename</button>
              <button onClick={()=>{onSetBagWeight();setMenu(false);}}
                style={{display:'block',width:'100%',padding:'9px 14px',fontSize:13,color:'var(--tx)',textAlign:'left'}}>Set bag weight</button>
              <button onClick={()=>{confirm(`Delete "${loc.name}" and all its items?`,onDel);setMenu(false);}}
                style={{display:'block',width:'100%',padding:'9px 14px',fontSize:13,color:'var(--rd)',textAlign:'left'}}>Delete</button>
            </div>}
          </div>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--tx3)',marginBottom:7}}>
        <span>{la.length} item{la.length!==1?'s':''} · {total} total</span>
        <span style={{color:done?'var(--gn)':'var(--tx3)'}}>{packed}/{total} packed</span>
      </div>
      <div style={{height:3,background:'var(--sf3)',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:2,transition:'width .35s ease',
          width:`${pct*100}%`,background:done?'var(--gn)':loc.color}}/>
      </div>
    </div>

    <div onClick={e=>e.target===e.currentTarget&&onAdd()}
      style={{flex:1,overflowY:'auto',padding:'0 8px',display:'flex',flexDirection:'column',gap:6,cursor:'default'}}>
      {sorted.length===0
        ?<div onClick={onAdd} style={{textAlign:'center',color:'var(--tx3)',fontSize:12,
            padding:'28px 0',cursor:'pointer'}}>
            Tap to add items
          </div>
        :null
      }
      {sorted.map(a=>{
        const item=items.find(i=>i.id===a.itemId);
        return item?<ItemCard key={a.id} item={item} a={a} locColor={loc.color}
          onToggle={()=>onToggle(a.itemId,loc.id)}
          onQty={q=>onQty(a.itemId,loc.id,q)}
          onOpen={()=>onOpen(a.itemId)}/>:null;
      })}
      <div style={{height:8}}/>
    </div>

    <div style={{padding:8,borderTop:'1px solid var(--bd)',flexShrink:0}}>
      <button onClick={onAdd} style={{width:'100%',padding:'7px',borderRadius:7,
        background:'var(--sf2)',border:'1px dashed var(--bd)',
        color:'var(--tx3)',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
        <span style={{fontSize:16}}>+</span> Add item
      </button>
    </div>
  </div>;
}

/* ── ITEM DRAWER ─────────────────────────────────────────────────── */
function ItemDrawer({item,locations,assignments,onClose,onQty,onToggle,onRename,onSetWeight,onDel}){
  const [editVal,setEditVal]=useState(null);
  const [editingWeight,setEditingWeight]=useState(false);
  const [weightVal,setWeightVal]=useState('');
  const wRef=useRef();
  const{ask:confirm,el:confirmEl}=useConfirm();
  const totalQty=assignments.reduce((s,a)=>s+a.quantity,0);
  const packedQty=assignments.filter(a=>a.packed).reduce((s,a)=>s+a.quantity,0);
  const itemWeight = item.weight ?? 200;
  const totalWeight = itemWeight * totalQty;
  const saveRename=()=>{if(editVal?.trim())onRename(editVal.trim());setEditVal(null);};
  const startWeight=()=>{setWeightVal(String(itemWeight));setEditingWeight(true);};
  const saveWeight=()=>{
    const v=parseInt(weightVal);
    if(!isNaN(v)&&v>=0)onSetWeight(v);
    setEditingWeight(false);
  };
  useEffect(()=>{if(editingWeight)wRef.current?.focus();},[editingWeight]);

  return <>
    {confirmEl}
    <Veil onClick={onClose} alpha={.38}/>
    <div className="drawer-panel">

      <div style={{padding:'18px 18px 14px',borderBottom:'1px solid var(--bd)',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div style={{flex:1,marginRig
