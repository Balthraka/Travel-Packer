html,body,#root{height:100%;background:var(--bg)}

@keyframes fdModal{

/* ── BOARD MOBILE ── */
.board-container{
  display:flex;gap:16px;padding:16px;
  overflow-x:auto;overflow-y:hidden;
  align-items:stretch;flex:1;
  -webkit-overflow-scrolling:touch;
}
.loc-col{
  width:274px;flex-shrink:0;background:var(--sf);
  border:1px solid var(--bd);border-radius:10px;
  display:flex;flex-direction:column;height:100%;overflow:hidden;
}
.drawer-panel{
  position:fixed;right:0;top:0;bottom:0;width:358px;
  background:var(--sf);border-left:1px solid var(--bd);
  z-index:201;display:flex;flex-direction:column;
  animation:slR .25s ease;
}
/* desktop-only header buttons */
.hdr-desktop{display:flex;align-items:center;gap:8px;}
.hdr-mobile-menu{display:none;}

@media(max-width:768px){
  .board-container{
    padding:10px;gap:10px;
    scroll-snap-type:x mandatory;
    scroll-padding:10px;
  }
  .loc-col{
    width:calc(100vw - 32px) !important;
    min-width:calc(100vw - 32px);
    scroll-snap-align:start;
    scroll-snap-stop:always;
  }
  .drawer-panel{
    width:100vw !important;
    border-left:none !important;
  }
  .hdr-desktop{display:none !important;}
  .hdr-mobile-menu{display:flex !important;align-items:center;gap:8px;}
  .board-add-loc{
    min-width:calc(100vw - 32px) !important;
    scroll-snap-align:start;
  }
  .mob-dots{display:flex !important;}
}
.mob-dots{display:none;}

/* ── SAFE AREA (Android gesture bar / iPhone home indicator) ── */
@supports (padding-bottom: env(safe-area-inset-bottom)){
  .board-container{
    padding-bottom: calc(16px + env(safe-area-inset-bottom));

    }
  }
  .drawer-panel-footer{
    padding-bottom: calc(14px + env(safe-area-inset-bottom)) !important;
  }
}

/* ── PRIMITIVES ──────────────────────────────────────────────────── */
function Veil({onClick,alpha=.55}){
  return <div onClick={onClick} style={{position:'fixed',inset:0,
    background:`rgba(0,0,0,${alpha})`,zIndex:200,animation:'fd .15s ease'}}/>;
}

function Modal({title,onClose,children,w=380}){
  return <>
    <Veil onClick={onClose}/>
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',

function Confirm({message,onConfirm,onCancel,danger=true}){
  return <>

    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',

          color:danger?'var(--rd)':'#1a0e00'}}>

}

function useConfirm(){
  const [state,setState]=useState(null);
  const ask=(message,onConfirm,danger=true)=>setState({message,onConfirm,danger});
  const el=state?<Confirm message={state.message} danger={state.danger}
    onConfirm={()=>{state.onConfirm();setState(null);}}
    onCancel={()=>setState(null)}/>:null;
  return{ask,el};
}

  return <div style={{display:'flex',gap:8}}>
    <input ref={r} value={v} onChange={e=>setV(e.target.value)}
      onKeyDown={e=>e.key==='Enter'&&go()} placeholder={placeholder}

/* ── ITEM CARD (board) ───────────────────────────────────────────── */
const isTouchPrimary=()=>window.matchMedia('(hover:none)').matches;

function ItemCard({item,a,locColor,onToggle,onQty,onOpen,onDragStart,onDragEnter,onDragEnd,showInsertLine,sort='personal'}){
  const canDrag=!a.packed&&sort==='personal';

  const onHandleTouchStart=e=>{
    e.stopPropagation();
    onDragStart(a.id);

    const ghost=document.createElement('div');
    ghost.textContent=item.name;
    Object.assign(ghost.style,{
      position:'fixed',left:'-9999px',top:'-9999px',
      zIndex:9999,pointerEvents:'none',
      background:'var(--am)',color:'#1a0e00',
      padding:'8px 14px',borderRadius:8,fontSize:13,fontWeight:700,
      boxShadow:'0 8px 24px rgba(0,0,0,.5)',
      opacity:'0.92',whiteSpace:'nowrap',
      transform:'translate(-50%,-180%)',
    });
    document.body.appendChild(ghost);

    const move=ev=>{
      ev.preventDefault();
      const t=ev.touches[0];
      ghost.style.left=t.clientX+'px';
      ghost.style.top=t.clientY+'px';
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const card=el?.closest('[data-assignid]');
      if(card&&card.dataset.assignid!==a.id) onDragEnter(card.dataset.assignid);
    };
    const end=()=>{
      ghost.remove();
      onDragEnd();
      document.removeEventListener('touchmove',move);
      document.removeEventListener('touchend',end);
    };
    document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('touchend',end);
  };

  return <>
    {showInsertLine&&<div style={{height:3,borderRadius:2,background:'var(--am)',
      margin:'2px 6px',flexShrink:0}}/>}
    <div
      data-assignid={a.id}
      draggable={canDrag}
      onDragStart={canDrag?e=>{
        e.dataTransfer.effectAllowed='move';
        onDragStart(a.id);
      }:undefined}
      onDragEnter={e=>{e.preventDefault();if(onDragEnter)onDragEnter(a.id);}}
      onDragOver={e=>e.preventDefault()}
      onDragEnd={canDrag?onDragEnd:undefined}
      style={{background:a.packed?`${locColor}0c`:'var(--sf2)',
        border:`1px solid ${a.packed?locColor+'38':'var(--bd)'}`,
        borderRadius:8,padding:'9px 11px',display:'flex',alignItems:'center',gap:8,
        transition:'border-color .15s',opacity:a.packed?.58:1,marginBottom:6}}>
      {canDrag&&<span
        onTouchStart={isTouchPrimary()?onHandleTouchStart:undefined}
        style={{color:'var(--tx3)',fontSize:16,flexShrink:0,
          lineHeight:1,padding:'4px 4px',userSelect:'none',
          touchAction:'none',cursor:'grab'}}>
        ⠿
      </span>}
      <PackBox packed={a.packed} onChange={onToggle}/>
      <span onClick={onOpen} style={{flex:1,fontSize:13,fontWeight:500,cursor:'pointer',
        textDecoration:a.packed?'line-through':'none',color:'var(--tx)'}}>
        {item.name}
      </span>
      <Qty value={a.quantity} onChange={onQty}/>
    </div>
  </>;
}

/* ── LOCATION COLUMN ─────────────────────────────────────────────── */
function LocCol({loc,items,assignments,onAdd,onToggle,onQty,onOpen,onRename,onSetBagWeight,onDel,onReorder,sort='personal'}){
  const [menu,setMenu]=useState(false);
  const [dragId,setDragId]=useState(null);
  const [overId,setOverId]=useState(null);
  // Refs so handleDragEnd always reads current values, not stale closure
  const dragIdRef=useRef(null);
  const overIdRef=useRef(null);
  const mRef=useRef();
  const{ask:confirm,el:confirmEl}=useConfirm();
  useEffect(()=>{
    if(!menu)return;
    const fn=e=>{if(!mRef.current?.contains(e.target))setMenu(false);};
    document.addEventListener('mousedown',fn);
    return()=>document.removeEventListener('mousedown',fn);
  },[menu]);

  const la=assignments.filter(a=>a.locationId===loc.id);
  const total=la.reduce((s,a)=>s+a.quantity,0);
  const packed=la.filter(a=>a.packed).reduce((s,a)=>s+a.quantity,0);
  const pct=total>0?packed/total:0;
  const done=total>0&&packed===total;

  // Sort within each packed/unpacked group; attach item for sort comparators
  const withItem=la.map(a=>({...a,item:items.find(i=>i.id===a.itemId)}));
  const unpackedRows=withItem.filter(a=>!a.packed);
  const packedRows=withItem.filter(a=>a.packed);
  const sortedAssign=(rows)=>{
    if(sort==='personal')return rows;
    return [...rows].sort((a,b)=>{
      const na=a.item?.name||'';const nb=b.item?.name||'';
      const wa=a.item?.weight??200;const wb=b.item?.weight??200;
      if(sort==='az')return na.localeCompare(nb);
      if(sort==='za')return nb.localeCompare(na);
      if(sort==='asc')return wa-wb;
      if(sort==='desc')return wb-wa;
      return 0;
    });
  };
  const sorted=[...sortedAssign(unpackedRows),...sortedAssign(packedRows)];

  const bagW = loc.bagWeight ?? 0;
  const contentsW = la.reduce((s,a)=>{ const item=items.find(i=>i.id===a.itemId); return s+(item?.weight??200)*a.quantity; },0);
  const totalW = bagW + contentsW;

  const startDrag=id=>{setDragId(id);dragIdRef.current=id;};
  const enterDrag=id=>{setOverId(id);overIdRef.current=id;};
  const handleDragEnd=()=>{
    const from=dragIdRef.current;
    const to=overIdRef.current;
    if(from&&to&&from!==to) onReorder(loc.id,from,to);
    setDragId(null);setOverId(null);
    dragIdRef.current=null;overIdRef.current=null;
  };

  return <div className="loc-col" style={{borderTop:`3px solid ${loc.color}`}}
    onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget)){setOverId(null);overIdRef.current=null;}}}>
    {confirmEl}
    <div style={{padding:'12px 12px 10px',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <div className="bb" style={{fontSize:18,color:loc.color,letterSpacing:2}}>{loc.name}</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--tx)',fontFamily:'Outfit,sans-serif'}}>~{fmtW(totalW)}</div>
            {bagW>0&&<div style={{fontSize:9,color:'var(--tx3)',lineHeight:1}}>bag: {fmtW(bagW)}</div>}
          </div>
          <div style={{position:'relative'}} ref={mRef}>
            <button onClick={()=>setMenu(m=>!m)}
              style={{color:'var(--tx3)',fontSize:19,padding:'1px 5px',borderRadius:4,
                background:menu?'var(--sf3)':'transparent'}}>⋯</button>
            {menu&&<div style={{position:'absolute',right:0,top:'calc(100% + 4px)',
              background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:8,
              zIndex:20,width:168,boxShadow:'0 10px 28px rgba(0,0,0,.55)',overflow:'hidden'}}>
              <button onClick={()=>{onRename();setMenu(false);}}
                style={{display:'block',width:'100%',padding:'9px 14px',fontSize:13,color:'var(--tx)',textAlign:'left'}}>Rename</button>
              <button onClick={()=>{onSetBagWeight();setMenu(false);}}
                style={{display:'block',width:'100%',padding:'9px 14px',fontSize:13,color:'var(--tx)',textAlign:'left'}}>Set bag weight</button>
              <button onClick={()=>{confirm(`Delete "${loc.name}" and all its items?`,onDel);setMenu(false);}}
                style={{display:'block',width:'100%',padding:'9px 14px',fontSize:13,color:'var(--rd)',textAlign:'left'}}>Delete</button>
            </div>}
          </div>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--tx3)',marginBottom:7}}>
        <span>{la.length} item{la.length!==1?'s':''} · {total} total</span>
        <span style={{color:done?'var(--gn)':'var(--tx3)'}}>{packed}/{total} packed</span>
      </div>
      <div style={{height:3,background:'var(--sf3)',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:2,transition:'width .35s ease',
          width:`${pct*100}%`,background:done?'var(--gn)':loc.color}}/>
      </div>
    </div>

    <div onClick={e=>e.target===e.currentTarget&&onAdd()}
      style={{flex:1,overflowY:'auto',padding:'6px 8px 0',display:'flex',flexDirection:'column',cursor:'default'}}>
      {sorted.length===0
        ?<div onClick={onAdd} style={{textAlign:'center',color:'var(--tx3)',fontSize:12,
            padding:'28px 0',cursor:'pointer'}}>
            Tap to add items
          </div>
        :null
      }
      {sorted.map(a=>{
        return a.item?<ItemCard key={a.id} item={a.item} a={a} locColor={loc.color}
          onToggle={()=>onToggle(a.itemId,loc.id)}
          onQty={q=>onQty(a.itemId,loc.id,q)}
          onOpen={()=>onOpen(a.itemId)}
          onDragStart={id=>startDrag(id)}
          onDragEnter={id=>enterDrag(id)}
          onDragEnd={handleDragEnd}
          showInsertLine={overId===a.id&&dragId!==a.id&&overId!=='__bottom__'}
          sort={sort}/>:null;
      })}
      {/* Bottom drop zone — allows dropping after the last item */}
      <div
        data-assignid="__bottom__"
        onDragEnter={e=>{e.preventDefault();enterDrag('__bottom__');}}
        onDragOver={e=>e.preventDefault()}
        style={{flex:1,minHeight:24,position:'relative'}}>
        {overId==='__bottom__'&&dragId&&<div style={{height:3,borderRadius:2,
          background:'var(--am)',margin:'0 4px'}}/>}
      </div>
    </div>

    <div style={{padding:8,borderTop:'1px solid var(--bd)',flexShrink:0}}>
      <button onClick={onAdd} style={{width:'100%',padding:'7px',borderRadius:7,
        background:'var(--sf2)',border:'1px dashed var(--bd)',
        color:'var(--tx3)',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
        <span style={{fontSize:16}}>+</span> Add item
      </button>
    </div>
  </div>;
}

/* ── ITEM DRAWER ─────────────────────────────────────────────────── */
function ItemDrawer({item,locations,assignments,onClose,onQty,onToggle,onRename,onSetWeight,onDel}){
  const [editVal,setEditVal]=useState(null);
  const [editingWeight,setEditingWeight]=useState(false);
  const [weightVal,setWeightVal]=useState('');
  const wRef=useRef();
  const{ask:confirm,el:confirmEl}=useConfirm();
  const totalQty=assignments.reduce((s,a)=>s+a.quantity,0);
  const packedQty=assignments.filter(a=>a.packed).reduce((s,a)=>s+a.quantity,0);
  const itemWeight = item.weight ?? 200;
  const totalWeight = itemWeight * totalQty;
  const saveRename=()=>{if(editVal?.trim())onRename(editVal.trim());setEditVal(null);};
  const startWeight=()=>{setWeightVal(String(itemWeight));setEditingWeight(true);};
  const saveWeight=()=>{
    const v=parseInt(weightVal);
    if(!isNaN(v)&&v>=0)onSetWeight(v);
    setEditingWeight(false);
  };
  useEffect(()=>{if(editingWeight)wRef.current?.focus();},[editingWeight]);

  return <>
    {confirmEl}
    <Veil onClick={onClose} alpha={.38}/>
    <div className="drawer-panel">

      <div style={{padding:'18px 18px 14px',borderBottom:'1px solid var(--bd)',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div style={{flex:1,marginRight:12}}>
            <div style={{fontSize:10,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>
              {item.category}
            </div>
            {editVal!==null
              ?<input value={editVal} onChange={e=>setEditVal(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')saveRename();if(e.key==='Escape')setEditVal(null);}}
                  autoFocus style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--am)',
                    borderRadius:6,padding:'5px 9px',color:'var(--tx)',fontSize:16,fontWeight:600,outline:'none'}}/>
              :<div style={{fontSize:17,fontWeight:700}}>{item.name}</div>
            }
          </div>
          <button onClick={onClose} style={{color:'var(--tx2)',fontSize:19,flexShrink:0}}>✕</button>
        </div>

        {/* Stats row */}
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          {[['Total',totalQty,'var(--am)'],['Packed',packedQty,'var(--gn)'],['To Pack',totalQty-packedQty,'var(--tx2)']].map(([l,v,c])=>(
            <div key={l} style={{flex:1,background:'var(--sf2)',borderRadius:7,padding:'8px 10px',textAlign:'center'}}>
              <div style={{fontSize:21,fontWeight:700,color:c}}>{v}</div>
              <div style={{fontSize:10,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:.5}}>{l}</div>
            </div>
          ))}
        </div>

        {/* Weight row */}
        <div style={{background:'var(--sf2)',borderRadius:8,padding:'9px 12px',
          display:'flex',alignItems:'center',gap:8}}>
          <div style={{fontSize:11,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:.7,flex:1}}>
            Weight per item
          </div>
          {editingWeight
            ?<div style={{display:'flex',gap:6,alignItems:'center'}}>
                <input ref={wRef} value={weightVal} onChange={e=>setWeightVal(e.target.value.replace(/\D/g,''))}
                  onKeyDown={e=>{if(e.key==='Enter')saveWeight();if(e.key==='Escape')setEditingWeight(false);}}
                  onBlur={saveWeight}
                  style={{width:64,background:'var(--sf3)',border:'1px solid var(--am)',borderRadius:5,
                    padding:'3px 7px',color:'var(--tx)',fontSize:13,fontWeight:700,outline:'none',textAlign:'center'}}/>
                <span style={{fontSize:11,color:'var(--tx3)'}}>g</span>
              </div>
            :<button onClick={startWeight}
                style={{display:'flex',alignItems:'center',gap:6,padding:'3px 7px',borderRadius:5,
                  background:'var(--sf3)',border:'none',transition:'background .12s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--bd)'}
                onMouseLeave={e=>e.currentTarget.style.background='var(--sf3)'}>
                <span style={{fontSize:13,fontWeight:700,color:'var(--tx)'}}>{fmtW(itemWeight)}</span>
                <span style={{fontSize:10,color:'var(--tx3)'}}>✎</span>
              </button>
          }
          <div style={{fontSize:12,color:'var(--tx2)',borderLeft:'1px solid var(--bd)',paddingLeft:10,marginLeft:2}}>
            ~{fmtW(totalWeight)} total
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:16,paddingBottom:'calc(16px + env(safe-area-inset-bottom))'}}>
        <div style={{fontSize:10,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>
          Location Assignments
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {locations.map(loc=>{
            const a=assignments.find(x=>x.locationId===loc.id);
            const qty=a?.quantity||0;
            const locW=itemWeight*qty;
            return <div key={loc.id} style={{borderRadius:8,padding:'11px 13px',
              background:qty>0?'var(--sf2)':'transparent',
              border:`1px solid ${qty>0?loc.color+'40':'var(--bd)'}`,
              borderLeft:`3px solid ${qty>0?loc.color:'var(--bd)'}`,
              display:'flex',alignItems:'center',gap:12,transition:'all .2s'}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13,color:qty>0?'var(--tx)':'var(--tx3)'}}>{loc.name}</div>
                {qty>0&&a&&<div style={{fontSize:11,marginTop:2,color:a.packed?'var(--gn)':'var(--tx3)'}}>
                  {a.packed?'✓ Packed':'Not yet packed'}{qty>0?` · ~${fmtW(locW)}`:''}
                </div>}
              </div>
              {qty>0&&a&&<PackBox packed={a.packed} onChange={()=>onToggle(loc.id)}/>}
              <Qty value={qty} onChange={q=>onQty(loc.id,q)}/>
            </div>;
          })}
        </div>
      </div>

      <div className="drawer-panel-footer" style={{padding:'12px 14px 14px',borderTop:'1px solid var(--bd)',flexShrink:0}}>
        {editVal!==null
          ?<div style={{display:'flex',gap:8}}>
              <button onClick={()=>setEditVal(null)} style={{flex:1,padding:'9px',borderRadius:7,
                background:'var(--sf2)',border:'1px solid var(--bd)',fontSize:13}}>Cancel</button>
              <button onClick={saveRename} style={{flex:1,padding:'9px',borderRadius:7,
                background:'var(--am)',color:'#1a0e00',fontSize:13,fontWeight:700}}>Save Name</button>
            </div>
          :<>
            <button onClick={onClose} style={{width:'100%',padding:'11px',borderRadius:8,
              background:'var(--am)',color:'#1a0e00',fontSize:14,fontWeight:700,marginBottom:8}}>
              Done
            </button>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setEditVal(item.name)} style={{flex:1,padding:'7px',borderRadius:6,
                background:'var(--sf2)',border:'1px solid var(--bd)',fontSize:12,color:'var(--tx2)'}}>✎ Rename</button>
              <button onClick={()=>confirm(`Delete "${item.name}" from all locations?`,onDel)}
                style={{flex:1,padding:'7px',borderRadius:6,fontSize:12,fontWeight:500,
                  background:'rgba(240,82,82,.08)',border:'1px solid rgba(240,82,82,.25)',color:'var(--rd)'}}>
                ✗ Delete
              </button>
            </div>
          </>
        }
      </div>
    </div>
  </>;
}

/* ── CATEGORY FILTER ─────────────────────────────────────────────── */
function CategoryFilter({categories,selected,onSelect}){
  return <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:4,marginBottom:10,
    scrollbarWidth:'none',msOverflowStyle:'none'}}>
    {['All',...categories].map(cat=>(
      <button key={cat} onClick={()=>onSelect(cat==='All'?null:cat)}
        style={{padding:'4px 11px',borderRadius:20,fontSize:11,fontWeight:600,
          flexShrink:0,border:'none',transition:'all .12s',
          background:selected===(cat==='All'?null:cat)?'var(--am)':'var(--sf2)',
          color:selected===(cat==='All'?null:cat)?'#1a0e00':'var(--tx2)'}}>
        {cat}
      </button>
    ))}
  </div>;
}

function Picker({items,assignments,locId,loc,onClose,onSelect,onCreateAdd}){
  const [q,setQ]=useState('');
  const [cat,setCat]=useState(null);
  const [name,setName]=useState('');
  const [tab,setTab]=useState('pick');
  const qRef=useRef();
  useEffect(()=>{ qRef.current?.focus(); },[]);

  // Names already assigned to this column
  const takenInCol=new Set(
    assignments.filter(a=>a.locationId===locId).map(a=>{
      const item=items.find(i=>i.id===a.itemId);
      return item?.name.toLowerCase();
    }).filter(Boolean)
  );

  // Merge trip items + ITEM_TPLS master list, deduplicated by name
  const tripItemNames=new Set(items.map(i=>i.name.toLowerCase()));
  const masterExtras=ITEM_TPLS
    .filter(([n])=>!tripItemNames.has(n.toLowerCase()))
    .map(([n,c,w])=>({id:'__tpl__'+n,name:n,category:c,weight:w,_fromMaster:true}));
  const allItems=[...items,...masterExtras];

  // All available categories (from unfiltered pool)
  const available=allItems.filter(i=>!takenInCol.has(i.name.toLowerCase()));
  const categories=[...new Set(available.map(i=>i.category))].sort();

  // Apply search + category filter together
  const filtered=available.filter(i=>
    (!cat||i.category===cat)&&
    i.name.toLowerCase().includes(q.toLowerCase())
  );
  const grouped=filtered.reduce((acc,i)=>{(acc[i.category]=acc[i.category]||[]).push(i);return acc;},{});

  const handleSelect=item=>{
    if(item._fromMaster){
      onCreateAdd(item.name, item.category, item.weight);
    } else {
      onSelect(item.id);
    }
  };

  return <Modal title={`Add to ${loc.name}`} onClose={onClose} w={440}>
    <div style={{display:'flex',gap:6,marginBottom:14}}>
      {[['pick','Pick Item'],['new','New Item']].map(([v,l])=>(
        <button key={v} onClick={()=>setTab(v)} style={{padding:'5px 16px',borderRadius:20,
          fontSize:12,fontWeight:600,border:'none',
          background:tab===v?'var(--am)':'var(--sf2)',color:tab===v?'#1a0e00':'var(--tx2)'}}>
          {l}
        </button>
      ))}
    </div>

    {tab==='pick'&&<>
      <input ref={qRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search items…"
        style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--bd)',
          borderRadius:7,padding:'8px 12px',color:'var(--tx)',outline:'none',marginBottom:8}}/>
      <CategoryFilter categories={categories} selected={cat} onSelect={c=>{setCat(c);}}/>
      <div style={{maxHeight:310,overflowY:'auto',margin:'0 -24px',padding:'0 24px'}}>
        {Object.entries(grouped).length===0
          ?<div style={{textAlign:'center',color:'var(--tx3)',padding:'24px 0',fontSize:13}}>
            {q||cat?'No matches — try clearing the filter':'All items already added to this location'}
          </div>
          :Object.entries(grouped).map(([c,catItems])=>(
            <div key={c} style={{marginBottom:12}}>
              {!cat&&<div style={{fontSize:10,color:'var(--tx3)',textTransform:'uppercase',
                letterSpacing:1,fontWeight:600,marginBottom:4}}>{c}</div>}
              {catItems.map(item=>(
                <button key={item.id} onClick={()=>handleSelect(item)}
                  style={{display:'flex',alignItems:'center',width:'100%',
                    padding:'8px 10px',borderRadius:6,textAlign:'left',
                    fontSize:13,color:'var(--tx)',marginBottom:2,background:'transparent',transition:'background .1s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--sf2)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <span style={{flex:1}}>{item.name}</span>
                  {item.weight&&<span style={{fontSize:11,color:'var(--tx3)',marginRight:8}}>{fmtW(item.weight)}</span>}
                  <span style={{color:'var(--tx3)',fontSize:15}}>+</span>
                </button>
              ))}
            </div>
          ))
        }
      </div>
    </>}

    {tab==='new'&&<div>
      <div style={{fontSize:12,color:'var(--tx2)',marginBottom:8}}>
        Create a new item and add it to <b style={{color:'var(--tx)'}}>{loc.name}</b>:
      </div>
      <input value={name} onChange={e=>setName(e.target.value)} autoFocus
        onKeyDown={e=>e.key==='Enter'&&name.trim()&&onCreateAdd(name.trim())}
        placeholder="E.g. Silk Pyjamas…"
        style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--bd)',
          borderRadius:7,padding:'9px 12px',color:'var(--tx)',outline:'none',marginBottom:12}}/>
      <button onClick={()=>name.trim()&&onCreateAdd(name.trim())} disabled={!name.trim()}
        style={{width:'100%',padding:'10px',borderRadius:7,background:'var(--am)',
          color:'#1a0e00',fontWeight:700,fontSize:13,opacity:name.trim()?1:.45}}>
        Create & Add
      </button>
    </div>}
  </Modal>;
}

/* ── SORT HELPERS ────────────────────────────────────────────────── */
const SORT_OPTS=[
  {v:'personal',l:'Personal'},
  {v:'az',l:'A → Z'},
  {v:'za',l:'Z → A'},
  {v:'asc',l:'Lightest first'},
  {v:'desc',l:'Heaviest first'},
];

// Sort an array of assignment rows within a group (preserves group boundary)
const sortAssignRows=(rows,sort)=>{
  if(sort==='personal')return rows;
  return [...rows].sort((a,b)=>{
    const na=a.item?.name||'';const nb=b.item?.name||'';
    const wa=a.item?.weight??200;const wb=b.item?.weight??200;
    if(sort==='az')return na.localeCompare(nb);
    if(sort==='za')return nb.localeCompare(na);
    if(sort==='asc')return wa-wb;
    if(sort==='desc')return wb-wa;
    return 0;
  });
};

// Sort items (not assignments) within a group
const sortItems=(items,sort)=>{
  if(sort==='personal')return items;
  return [...items].sort((a,b)=>{
    if(sort==='az')return a.name.localeCompare(b.name);
    if(sort==='za')return b.name.localeCompare(a.name);
    if(sort==='asc')return (a.weight??200)-(b.weight??200);
    if(sort==='desc')return (b.weight??200)-(a.weight??200);
    return 0;
  });
};

function SortControl({value,onChange}){
  return <div style={{display:'flex',alignItems:'center',gap:6}}>
    <span style={{fontSize:11,color:'var(--tx3)',flexShrink:0}}>Sort</span>
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{background:'var(--sf2)',border:'1px solid var(--bd)',borderRadius:6,
        padding:'4px 8px',color:'var(--tx)',fontSize:12,outline:'none',cursor:'pointer'}}>
      {SORT_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
    </select>
  </div>;
}

/* ── SUMMARY SUB-VIEWS ───────────────────────────────────────────── */

function StatusDot({packed}){
  return packed
    ?<span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',
        width:16,height:16,borderRadius:'50%',background:'var(--gn)',
        color:'#0f1419',fontSize:10,fontWeight:700,flexShrink:0}}>✓</span>
    :<span style={{display:'inline-block',width:16,height:16,borderRadius:'50%',
        border:'1.5px solid var(--sf3)',flexShrink:0}}/>;
}

function ListView({groups,items,showWeight,sort}){
  if(!groups.length) return <Empty/>;
  return groups.map(({loc,rows,totalW})=>{
    const unpacked=sortAssignRows(rows.filter(a=>!a.packed),sort);
    const packed=sortAssignRows(rows.filter(a=>a.packed),sort);
    const sortedRows=[...unpacked,...packed];
    const lTotal=sortedRows.reduce((s,a)=>s+a.quantity,0);
    const lPacked=packed.reduce((s,a)=>s+a.quantity,0);
    return <div key={loc.id} style={{background:'var(--sf)',border:'1px solid var(--bd)',
      borderTop:`3px solid ${loc.color}`,borderRadius:10,marginBottom:16,overflow:'hidden'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
        padding:'11px 16px',borderBottom:'1px solid var(--bd)'}}>
        <div className="bb" style={{fontSize:17,color:loc.color}}>{loc.name}</div>
        <div style={{display:'flex',gap:14,alignItems:'center'}}>
          {showWeight&&<div style={{fontSize:13,fontWeight:700,color:'var(--tx2)'}}>~{fmtW(totalW)}</div>}
          <div style={{fontSize:12,color:'var(--tx2)'}}>{lPacked}/{lTotal} packed</div>
        </div>
      </div>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead>
          <tr style={{background:'var(--sf2)'}}>
            <th style={{padding:'7px 16px',width:28}}></th>
            <th style={{padding:'7px 16px',textAlign:'left',fontSize:10,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:.8,fontWeight:600}}>Item</th>
            <th style={{padding:'7px 16px',textAlign:'center',fontSize:10,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:.8,fontWeight:600,width:50}}>Qty</th>
            {showWeight&&<th style={{padding:'7px 16px',textAlign:'right',fontSize:10,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:.8,fontWeight:600,width:80}}>Weight</th>}
            <th style={{padding:'7px 16px',textAlign:'center',fontSize:10,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:.8,fontWeight:600,width:88}}>Status</th>
          </tr>
        </thead>
        <tbody>
          {sortedRows.map(a=>{
            const itemObj=items.find(i=>i.id===a.itemId);
            const rowW=(itemObj?.weight??200)*a.quantity;
            return <tr key={a.id} style={{borderTop:'1px solid var(--bd)',background:a.packed?'rgba(63,214,138,.06)':'transparent'}}>
              <td style={{padding:'8px 0 8px 16px',textAlign:'center'}}><StatusDot packed={a.packed}/></td>
              <td style={{padding:'8px 16px',fontSize:13,color:'var(--tx)'}}>{a.item.name}</td>
              <td style={{padding:'8px 16px',textAlign:'center',fontSize:13,fontWeight:700}}>{a.quantity}</td>
              {showWeight&&<td style={{padding:'8px 16px',textAlign:'right',fontSize:12,color:'var(--tx3)'}}>{fmtW(rowW)}</td>}
              <td style={{padding:'8px 16px',textAlign:'center'}}>
                <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:4,
                  textTransform:'uppercase',letterSpacing:.5,
                  background:a.packed?'rgba(63,214,138,.15)':'rgba(240,82,82,.1)',
                  color:a.packed?'var(--gn)':'var(--rd)'}}>
                  {a.packed?'Packed':'To Pack'}
                </span>
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>;
  });
}

function BoardSummary({groups,showWeight,sort}){
  if(!groups.length) return <Empty/>;
  return <div style={{display:'flex',gap:14,overflowX:'auto',paddingBottom:12,alignItems:'flex-start'}}>
    {groups.map(({loc,rows,totalW})=>{
      const unpacked=sortAssignRows(rows.filter(a=>!a.packed),sort);
      const packed=sortAssignRows(rows.filter(a=>a.packed),sort);
      const sortedRows=[...unpacked,...packed];
      const lTotal=sortedRows.reduce((s,a)=>s+a.quantity,0);
      const lPacked=packed.reduce((s,a)=>s+a.quantity,0);
      const pct=lTotal>0?(lPacked/lTotal)*100:0;
      return <div key={loc.id} style={{minWidth:210,flex:1,background:'var(--sf)',
        border:'1px solid var(--bd)',borderTop:`3px solid ${loc.color}`,
        borderRadius:10,overflow:'hidden',flexShrink:0}}>
        <div style={{padding:'11px 14px 10px',borderBottom:'1px solid var(--bd)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
            <div className="bb" style={{fontSize:16,color:loc.color}}>{loc.name}</div>
            {showWeight&&<div style={{fontSize:13,fontWeight:700,color:'var(--tx2)'}}>~{fmtW(totalW)}</div>}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--tx3)',marginBottom:6}}>
            <span>{rows.length} item{rows.length!==1?'s':''}</span>
            <span style={{color:pct===100?'var(--gn)':'var(--tx3)'}}>{lPacked}/{lTotal}</span>
          </div>
          <div style={{height:3,background:'var(--sf3)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:2,width:`${pct}%`,background:pct===100?'var(--gn)':loc.color}}/>
          </div>
        </div>
        <div>
          {sortedRows.map(a=>(
            <div key={a.id} style={{display:'flex',alignItems:'center',gap:9,
              padding:'7px 14px',borderBottom:'1px solid var(--bd)',
              background:a.packed?'rgba(63,214,138,.05)':'transparent'}}>
              <StatusDot packed={a.packed}/>
              <span style={{flex:1,fontSize:12,color:'var(--tx)'}}>{a.item.name}</span>
              <span style={{fontSize:12,fontWeight:700,color:'var(--tx2)',flexShrink:0}}>×{a.quantity}</span>
            </div>
          ))}
        </div>
      </div>;
    })}
  </div>;
}

function GridSummary({trip,showWeight,sort}){
  const locs=trip.locations;
  const assignedItems=trip.items.filter(item=>trip.assignments.some(a=>a.itemId===item.id));
  if(!assignedItems.length) return <Empty/>;

  const byCategory=assignedItems.reduce((acc,item)=>{
    (acc[item.category]=acc[item.category]||[]).push(item);return acc;
  },{});
  // Sort within each category group
  Object.keys(byCategory).forEach(cat=>{
    byCategory[cat]=sortItems(byCategory[cat],sort);
  });

  const locStats=locs.map(loc=>{
    const la=trip.assignments.filter(a=>a.locationId===loc.id);
    const contentsW=la.reduce((s,a)=>{const it=trip.items.find(i=>i.id===a.itemId);return s+(it?.weight??200)*a.quantity;},0);
    const totalW=(loc.bagWeight??0)+contentsW;
    return{
      total:la.reduce((s,a)=>s+a.quantity,0),
      packed:la.filter(a=>a.packed).reduce((s,a)=>s+a.quantity,0),
      totalW,
    };
  });

  const cell=(item,loc)=>{
    const a=trip.assignments.find(x=>x.itemId===item.id&&x.locationId===loc.id);
    if(!a) return <td key={loc.id} style={{padding:'5px 8px',textAlign:'center',
      border:'1px solid var(--bd)',color:'var(--tx3)',fontSize:11}}>–</td>;
    return <td key={loc.id} style={{padding:'5px 8px',textAlign:'center',border:'1px solid var(--bd)',
      background:a.packed?'rgba(63,214,138,.12)':loc.color+'18'}}>
      <span style={{fontWeight:700,fontSize:12,color:a.packed?'var(--gn)':loc.color}}>
        {a.quantity}{a.packed?' ✓':''}
      </span>
    </td>;
  };

  const thStyle={padding:'7px 10px',textAlign:'center',background:'var(--sf2)',
    border:'1px solid var(--bd)',fontSize:11,fontWeight:700,whiteSpace:'nowrap'};

  return <div style={{overflowX:'auto'}}>
    <table style={{borderCollapse:'collapse',fontSize:12,width:'100%'}}>
      <thead>
        <tr>
          <th style={{...thStyle,textAlign:'left',minWidth:160,position:'sticky',left:0,
            fontSize:10,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:.8,fontWeight:600}}>
            Item
          </th>
          {locs.map((loc,i)=>(
            <th key={loc.id} style={{...thStyle,color:loc.color,minWidth:90}}>
              {loc.name}
              <div style={{fontSize:9,color:'var(--tx3)',fontWeight:400,marginTop:1}}>
                {locStats[i].packed}/{locStats[i].total}
              </div>
              {showWeight&&<div style={{fontSize:9,color:loc.color,fontWeight:600,marginTop:1}}>
                ~{fmtW(locStats[i].totalW)}
              </div>}
            </th>
          ))}
        </tr>
      </thead>
      <tbody>
        {Object.entries(byCategory).map(([cat,catItems])=>(
          <React.Fragment key={cat}>
            <tr>
              <td colSpan={locs.length+1} style={{padding:'4px 12px',background:'var(--sf3)',
                fontSize:9,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:1,
                fontWeight:700,border:'1px solid var(--bd)'}}>
                {cat}
              </td>
            </tr>
            {catItems.map(item=>(
              <tr key={item.id}>
                <td style={{padding:'5px 12px',border:'1px solid var(--bd)',fontSize:12,
                  color:'var(--tx)',background:'var(--sf)',position:'sticky',left:0}}>
                  <div>{item.name}</div>
                  {showWeight&&<div style={{fontSize:9,color:'var(--tx3)'}}>{fmtW(item.weight??200)} ea</div>}
                </td>
                {locs.map(loc=>cell(item,loc))}
              </tr>
            ))}
          </React.Fragment>
        ))}
      </tbody>
    </table>
    <div style={{marginTop:10,fontSize:11,color:'var(--tx3)'}}>
      Numbers show quantity · ✓ = packed · – = not assigned to this location{showWeight?' · weights include bag tare':''}
    </div>
  </div>;
}

function Empty(){
  return <div style={{textAlign:'center',color:'var(--tx3)',padding:'48px 0',fontSize:14}}>
    No items assigned yet. Head to Board view to start packing.
  </div>;
}

/* ── SUMMARY ─────────────────────────────────────────────────────── */
function Summary({trip,onResetPacked}){
  const [sumView,setSumView]=useState('list');
  const [showWeight,setShowWeight]=useState(true);
  const [sort,setSort]=useState('personal');
  const{ask:confirm,el:confirmEl}=useConfirm();
  const totalItems=trip.assignments.reduce((s,a)=>s+a.quantity,0);
  const packedItems=trip.assignments.filter(a=>a.packed).reduce((s,a)=>s+a.quantity,0);
  const pct=totalItems>0?(packedItems/totalItems)*100:0;

  // Compute total weight across all locations (contents only, no double-counting bags)
  const grandW=trip.locations.reduce((tot,loc)=>{
    const bagW=loc.bagWeight??0;
    const contW=trip.assignments
      .filter(a=>a.locationId===loc.id)
      .reduce((s,a)=>{const it=trip.items.find(i=>i.id===a.itemId);return s+(it?.weight??200)*a.quantity;},0);
    return tot+bagW+contW;
  },0);

  const groups=trip.locations.map(loc=>{
    const bagW=loc.bagWeight??0;
    const rows=trip.assignments
      .filter(a=>a.locationId===loc.id)
      .map(a=>({...a,item:trip.items.find(i=>i.id===a.itemId)}))
      .filter(a=>a.item)
      .sort((a,b)=>(a.packed?1:0)-(b.packed?1:0));
    const contW=rows.reduce((s,a)=>s+(a.item?.weight??200)*a.quantity,0);
    return{loc,rows,totalW:bagW+contW};
  }).filter(g=>g.rows.length>0);

  const viewOpts=[['list','List'],['board','Columns'],['grid','Grid']];

  return <div className="print-scroll" style={{flex:1,overflowY:'auto',padding:'24px 28px',paddingBottom:'calc(24px + env(safe-area-inset-bottom))'}}>
    {confirmEl}
    <div style={{maxWidth:sumView==='grid'?'100%':sumView==='board'?'100%':740,margin:'0 auto'}}>

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
        marginBottom:20,flexWrap:'wrap',gap:10}} className="np">
        <div className="bb" style={{fontSize:28,color:'var(--am)'}}>Packing Summary</div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',background:'var(--sf2)',borderRadius:7,
            border:'1px solid var(--bd)',padding:2}}>
            {viewOpts.map(([v,l])=>(
              <button key={v} onClick={()=>setSumView(v)} style={{padding:'4px 13px',borderRadius:5,
                fontSize:12,fontWeight:600,
                background:sumView===v?'var(--sf3)':'transparent',
                color:sumView===v?'var(--tx)':'var(--tx2)'}}>
                {l}
              </button>
            ))}
          </div>
          <SortControl value={sort} onChange={setSort}/>
          <button onClick={()=>setShowWeight(w=>!w)}
            style={{padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:600,
              background:showWeight?'var(--am-bg)':'var(--sf2)',
              border:`1px solid ${showWeight?'var(--am)':'var(--bd)'}`,
              color:showWeight?'var(--am)':'var(--tx2)'}}>
            ⚖ Weights {showWeight?'On':'Off'}
          </button>
          <button onClick={()=>confirm('Reset all items to unpacked? This cannot be undone.',onResetPacked,true)}
            style={{padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:600,
              background:'var(--sf2)',border:'1px solid var(--bd)',color:'var(--tx2)'}}>
            ↺ Reset Packed
          </button>
          <button onClick={()=>window.print()} style={{padding:'8px 16px',borderRadius:7,
            background:'var(--am)',color:'#1a0e00',fontWeight:700,fontSize:13}}>
            🖨 Print / Save PDF
          </button>
        </div>
      </div>

      {/* Overview bar */}
      <div style={{background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:10,
        padding:'14px 18px',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:18,fontWeight:700}}>{trip.name}</div>
            <div style={{fontSize:12,color:'var(--tx2)',marginTop:2}}>
              {packedItems}/{totalItems} packed · {trip.assignments.length} item types · {trip.locations.length} locations
              {showWeight&&<span style={{color:'var(--am)',fontWeight:600}}> · ~{fmtW(grandW)} total</span>}
            </div>
          </div>
          <div style={{flex:1,minWidth:120}}>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <div style={{flex:1,height:6,background:'var(--sf3)',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:3,transition:'width .3s',
                  width:`${pct}%`,background:pct===100?'var(--gn)':'var(--am)'}}/>
              </div>
              <span style={{fontSize:12,color:'var(--tx2)',flexShrink:0}}>{Math.round(pct)}%</span>
            </div>
          </div>
        </div>
      </div>

      {/* Grid hint */}
      {sumView==='grid'&&<div style={{fontSize:12,color:'var(--tx3)',marginBottom:12}} className="np">
        Tip: most compact for printing — use "Fit to page" in your browser print dialog.
      </div>}

      {sumView==='list'&&<ListView groups={groups} items={trip.items} showWeight={showWeight} sort={sort}/>}
      {sumView==='board'&&<BoardSummary groups={groups} showWeight={showWeight} sort={sort}/>}
      {sumView==='grid'&&<GridSummary trip={trip} showWeight={showWeight} sort={sort}/>}
    </div>
  </div>;
}

/* ── BAG WEIGHT MODAL ────────────────────────────────────────────── */
function BagWeightModal({loc,onClose,onSave}){
  const [val,setVal]=useState(String(loc?.bagWeight??0));
  const iRef=useRef();
  useEffect(()=>{iRef.current?.focus();iRef.current?.select();},[]);
  const save=()=>{const v=parseInt(val);if(!isNaN(v)&&v>=0)onSave(v);else onClose();};
  return <Modal title={`Bag Weight — ${loc?.name}`} onClose={onClose}>
    <div style={{fontSize:12,color:'var(--tx2)',marginBottom:10}}>
      Tare weight of the empty bag itself (grams). This is added to the contents weight to give the total load.
    </div>
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:16}}>
      <input ref={iRef} value={val} onChange={e=>setVal(e.target.value.replace(/\D/g,''))}
        onKeyDown={e=>e.key==='Enter'&&save()}
        style={{flex:1,background:'var(--sf2)',border:'1px solid var(--bd)',borderRadius:7,
          padding:'9px 12px',color:'var(--tx)',outline:'none',fontSize:16,fontWeight:700,textAlign:'center'}}/>
      <span style={{fontSize:14,color:'var(--tx2)',flexShrink:0}}>grams</span>
    </div>
    <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
      {[['No bag',0],['Tote',300],['Daypack',400],['Carry-on',1800],['Check-in (soft)',2500],['Check-in (hard)',3500]].map(([l,v])=>(
        <button key={l} onClick={()=>setVal(String(v))}
          style={{padding:'4px 10px',borderRadius:5,fontSize:11,fontWeight:600,
            background:val===String(v)?'var(--am)':'var(--sf2)',
            color:val===String(v)?'#1a0e00':'var(--tx2)',
            border:`1px solid ${val===String(v)?'var(--am)':'var(--bd)'}`}}>
          {l} {v>0?`(${fmtW(v)})` :''}
        </button>
      ))}
    </div>
    <button onClick={save} style={{width:'100%',padding:'10px',borderRadius:7,background:'var(--am)',
      color:'#1a0e00',fontWeight:700,fontSize:13}}>Save</button>
  </Modal>;
}

/* ── BOARD ───────────────────────────────────────────────────────── */
function Board({trip,onAdd,onToggle,onQty,onOpen,onAddLoc,onRenameLoc,onSetBagWeight,onDelLoc,onReorder}){
  const [activeIdx,setActiveIdx]=useState(0);
  const [sort,setSort]=useState('personal');
  const scrollRef=useRef();

  const onScroll=()=>{
    const el=scrollRef.current;
    if(!el)return;
    const colW=el.clientWidth;
    setActiveIdx(Math.round(el.scrollLeft/colW));
  };

  return <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
    {/* Sort bar */}
    <div className="np" style={{display:'flex',alignItems:'center',justifyContent:'flex-end',
      padding:'6px 16px',borderBottom:'1px solid var(--bd)',flexShrink:0,gap:8}}>
      <SortControl value={sort} onChange={setSort}/>
      {sort!=='personal'&&<span style={{fontSize:11,color:'var(--tx3)'}}>
        Drag to reorder only available in Personal order
      </span>}
    </div>
    <div ref={scrollRef} className="board-container" onScroll={onScroll}>
      {trip.locations.length===0&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',
        flex:1,flexDirection:'column',gap:12,color:'var(--tx3)',padding:40,minWidth:'100%'}}>
        <div style={{fontSize:32}}>📦</div>
        <div style={{fontSize:15,fontWeight:600,color:'var(--tx)'}}>No locations yet</div>
        <div style={{fontSize:13,textAlign:'center'}}>Add a location (e.g. Carry-on, Checked Bag) to start organising your packing.</div>
        <button onClick={onAddLoc} style={{marginTop:8,padding:'9px 20px',borderRadius:8,
          background:'var(--am)',color:'#1a0e00',fontWeight:700,fontSize:13}}>
          + Add Location
        </button>
      </div>}
      {trip.locations.map(loc=>(
        <LocCol key={loc.id} loc={loc} items={trip.items} assignments={trip.assignments}
          onAdd={()=>onAdd(loc.id)} onToggle={onToggle} onQty={onQty} onOpen={onOpen}
          onRename={()=>onRenameLoc(loc.id)}
          onSetBagWeight={()=>onSetBagWeight(loc.id)}
          onDel={()=>onDelLoc(loc.id)}
          onReorder={onReorder}
          sort={sort}/>
      ))}
      <button onClick={onAddLoc} className="board-add-loc"
        style={{width:200,flexShrink:0,alignSelf:'flex-start',
          border:'1px dashed var(--bd)',borderRadius:10,padding:20,color:'var(--tx3)',
          fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        <span style={{fontSize:20}}>+</span> Add Location
      </button>
    </div>
    {/* Scroll dots — mobile only */}
    {trip.locations.length>1&&<div style={{display:'flex',justifyContent:'center',gap:6,
      padding:'8px 0 4px',flexShrink:0}} className="mob-dots">
      {trip.locations.map((loc,i)=>(
        <div key={loc.id} style={{width:i===activeIdx?20:6,height:6,borderRadius:3,
          transition:'all .2s',background:i===activeIdx?loc.color:'var(--sf3)'}}/>
      ))}
    </div>}
  </div>;
}

/* ── SAVE INDICATOR ──────────────────────────────────────────────── */
function SaveIndicator({status}){
  if(status==='idle')return null;
  const cfg={
    saving:{text:'Saving…',color:'var(--tx3)'},
    saved: {text:'✓ Saved', color:'var(--gn)'},
    error: {text:'⚠ Save failed',color:'var(--rd)'},
  }[status]||{};
  return <span style={{fontSize:11,color:cfg.color,marginRight:10,
    transition:'opacity .3s',whiteSpace:'nowrap'}}>{cfg.text}</span>;
}

/* ── DISPLAY NAME ────────────────────────────────────────────────── */
function DisplayName({user,onUpdate}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState('');
  const [feedback,setFeedback]=useState(''); // '' | 'saving' | 'saved' | 'error'
  const iRef=useRef();
  const displayName=user?.user_metadata?.display_name||user?.email||'';

  const start=()=>{setVal(user?.user_metadata?.display_name||'');setEditing(true);};
  const save=async()=>{
    const v=val.trim();
    setEditing(false);
    if(!v||v===(user?.user_metadata?.display_name||''))return;
    setFeedback('saving');
    try{
      const{data,error}=await sb.auth.updateUser({data:{display_name:v}});
      if(error)throw error;
      if(data?.user)onUpdate(data.user);
      setFeedback('saved');
      setTimeout(()=>setFeedback(''),2000);
    }catch{
      setFeedback('error');
      setTimeout(()=>setFeedback(''),3000);
    }
  };
  useEffect(()=>{if(editing)iRef.current?.focus();},[editing]);

  const feedbackColor={saving:'var(--tx3)',saved:'var(--gn)',error:'var(--rd)'}[feedback];

  if(editing) return (
    <input ref={iRef} value={val} onChange={e=>setVal(e.target.value)}
      onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape')setEditing(false);}}
      onBlur={save} placeholder="Your name"
      style={{fontSize:12,background:'var(--sf2)',border:'1px solid var(--am)',
        borderRadius:6,padding:'3px 9px',color:'var(--tx)',outline:'none',width:140}}/>
  );
  return (
    <div style={{display:'flex',alignItems:'center',gap:4}}>
      {feedback&&<span style={{fontSize:10,color:feedbackColor}}>
        {feedback==='saving'?'…':feedback==='saved'?'✓':'⚠'}
      </span>}
      <button onClick={start} title="Click to set display name"
        style={{fontSize:12,color:'var(--tx3)',padding:'3px 8px',borderRadius:5,
          maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
          transition:'background .12s'}}
        onMouseEnter={e=>e.currentTarget.style.background='var(--sf2)'}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        {displayName} ✎
      </button>
    </div>
  );
}

/* ── TRIP HEADER ─────────────────────────────────────────────────── */
function TripHeader({trip,onHome,onRename,onSignOut,user,onUpdateUser,onSaveTemplate,onApplyTemplate,saveStatus,view,onView}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState('');
  const [mobileMenu,setMobileMenu]=useState(false);
  const iRef=useRef();
  const mRef=useRef();

  const startEdit=()=>{setVal(trip.name);setEditing(true);};
  const save=()=>{if(val.trim()&&val.trim()!==trip.name)onRename(val.trim());setEditing(false);};
  useEffect(()=>{if(editing)iRef.current?.focus();},[editing]);
  useEffect(()=>{
    if(!mobileMenu)return;
    const fn=e=>{if(!mRef.current?.contains(e.target))setMobileMenu(false);};
    document.addEventListener('mousedown',fn);
    return()=>document.removeEventListener('mousedown',fn);
  },[mobileMenu]);

  const tripNameEl = editing
    ?<input ref={iRef} value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape')setEditing(false);}}
        onBlur={save}
        style={{fontSize:14,fontWeight:600,background:'var(--sf2)',border:'1px solid var(--am)',
          borderRadius:6,padding:'3px 8px',color:'var(--tx)',outline:'none',maxWidth:200,minWidth:80}}/>
    :<button onClick={startEdit} title="Click to rename"
        style={{fontSize:14,fontWeight:600,color:'var(--tx2)',maxWidth:200,padding:'3px 7px',
          borderRadius:5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
          transition:'background .12s',textAlign:'left'}}
        onMouseEnter={e=>e.currentTarget.style.background='var(--sf2)'}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        {trip.name} <span style={{fontSize:11,color:'var(--tx3)',marginLeft:2}}>✎</span>
      </button>;

  return <div className="np" style={{display:'flex',alignItems:'center',gap:8,
    padding:'0 12px',height:54,background:'var(--sf)',
    borderBottom:'1px solid var(--bd)',flexShrink:0}}>

    {/* Logo */}
    <button onClick={onHome} className="bb"
      style={{fontSize:22,color:'var(--am)',letterSpacing:3,padding:0,flexShrink:0,transition:'opacity .15s'}}
      onMouseEnter={e=>e.currentTarget.style.opacity='.65'}
      onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
      PACKR
    </button>
    <span style={{color:'var(--bd)',fontSize:16,userSelect:'none',flexShrink:0}}>/</span>
    {tripNameEl}

    {/* View toggle */}
    <div style={{display:'flex',background:'var(--sf2)',borderRadius:7,
      border:'1px solid var(--bd)',padding:2,flexShrink:0}}>
      {[['board','Board'],['summary','Summary']].map(([v,l])=>(
        <button key={v} onClick={()=>onView(v)} style={{padding:'4px 10px',borderRadius:5,
          fontSize:12,fontWeight:600,
          background:view===v?'var(--sf3)':'transparent',
          color:view===v?'var(--tx)':'var(--tx2)'}}>
          {l}
        </button>
      ))}
    </div>

    <div style={{flex:1}}/>

    {/* Desktop buttons */}
    <div className="hdr-desktop">
      <button onClick={onApplyTemplate} style={{padding:'5px 10px',borderRadius:6,fontSize:12,
        background:'var(--sf2)',border:'1px solid var(--bd)',color:'var(--tx2)'}}>⚡ Apply Template</button>
      <button onClick={onSaveTemplate} style={{padding:'5px 10px',borderRadius:6,fontSize:12,
        background:'var(--sf2)',border:'1px solid var(--bd)',color:'var(--am)'}}>+ Save Template</button>
      <div style={{width:1,height:20,background:'var(--bd)'}}/>
      <SaveIndicator status={saveStatus}/>
      <DisplayName user={user} onUpdate={onUpdateUser}/>
      <button onClick={onSignOut} style={{fontSize:12,color:'var(--tx3)',padding:'5px 10px',
        borderRadius:6,border:'1px solid var(--bd)',background:'var(--sf2)',flexShrink:0}}>Sign out</button>
    </div>

    {/* Mobile overflow menu */}
    <div className="hdr-mobile-menu" ref={mRef} style={{position:'relative'}}>
      <button onClick={()=>setMobileMenu(m=>!m)}
        style={{width:36,height:36,borderRadius:8,background:mobileMenu?'var(--sf3)':'var(--sf2)',
          border:'1px solid var(--bd)',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>
        ⋯
      </button>
      {mobileMenu&&<div style={{position:'absolute',right:0,top:'calc(100% + 6px)',
        background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:10,
        zIndex:300,width:210,boxShadow:'0 12px 32px rgba(0,0,0,.7)',overflow:'hidden'}}>
        <div style={{padding:'10px 14px 6px',fontSize:10,color:'var(--tx3)',
          textTransform:'uppercase',letterSpacing:1}}>
          <DisplayName user={user} onUpdate={u=>{onUpdateUser(u);setMobileMenu(false);}}/>
        </div>
        <div style={{height:1,background:'var(--bd)',margin:'6px 0'}}/>
        {[
          ['⚡ Apply Template', onApplyTemplate, 'var(--tx)'],
          ['+ Save Template',   onSaveTemplate,  'var(--am)'],
        ].map(([l,fn,c])=>(
          <button key={l} onClick={()=>{fn();setMobileMenu(false);}}
            style={{display:'block',width:'100%',padding:'11px 14px',fontSize:13,
              color:c,textAlign:'left'}}>
            {l}
          </button>
        ))}
        <div style={{height:1,background:'var(--bd)'}}/>
        <button onClick={()=>{onSignOut();setMobileMenu(false);}}
          style={{display:'block',width:'100%',padding:'11px 14px',fontSize:13,
            color:'var(--rd)',textAlign:'left'}}>
          Sign out
        </button>
      </div>}
    </div>
  </div>;
}

/* ── TEMPLATE ITEM PICKER ────────────────────────────────────────── */
function TemplateItemPicker({locName,takenNames,onClose,onAdd}){
  const [q,setQ]=useState('');
  const [cat,setCat]=useState(null);
  const [tab,setTab]=useState('pick');
  const [customName,setCustomName]=useState('');
  const [lastAdded,setLastAdded]=useState('');
  const qRef=useRef();
  const cRef=useRef();
  useEffect(()=>{qRef.current?.focus();},[]);
  useEffect(()=>{if(tab==='custom')cRef.current?.focus();},[tab]);

  // Full available pool
  const available=ITEM_TPLS.filter(([name])=>!takenNames.has(name.toLowerCase()));
  const categories=[...new Set(available.map(([,cat])=>cat))].sort();

  // Apply search + category together
  const filtered=available.filter(([name,c])=>
    (!cat||c===cat)&&name.toLowerCase().includes(q.toLowerCase())
  );
  const grouped=filtered.reduce((acc,[name,cat,weight])=>{
    (acc[cat]=acc[cat]||[]).push({name,cat,weight});return acc;
  },{});

  const pick=(name,cat,weight)=>{
    onAdd({itemName:name,itemCategory:cat,itemWeight:weight,locationName:locName,quantity:1});
    setLastAdded(name);
  };
  const pickCustom=()=>{
    if(!customName.trim())return;
    onAdd({itemName:customName.trim(),itemCategory:'Custom',itemWeight:200,locationName:locName,quantity:1});
    setLastAdded(customName.trim());
    setCustomName('');
  };

  return <Modal title={`Add to ${locName}`} onClose={onClose} w={440}>
    {lastAdded&&<div style={{fontSize:12,color:'var(--gn)',marginBottom:10,padding:'6px 10px',
      background:'rgba(63,214,138,.08)',borderRadius:6,border:'1px solid rgba(63,214,138,.2)'}}>
      ✓ Added: {lastAdded}
    </div>}

    {/* Tabs */}
    <div style={{display:'flex',gap:6,marginBottom:14}}>
      {[['pick','Pick Item'],['custom','New Item']].map(([v,l])=>(
        <button key={v} onClick={()=>setTab(v)} style={{padding:'5px 14px',borderRadius:20,
          fontSize:12,fontWeight:600,border:'none',
          background:tab===v?'var(--am)':'var(--sf2)',color:tab===v?'#1a0e00':'var(--tx2)'}}>
          {l}
        </button>
      ))}
    </div>

    {tab==='pick'&&<>
      <input ref={qRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search items…"
        style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--bd)',
          borderRadius:7,padding:'8px 12px',color:'var(--tx)',outline:'none',marginBottom:8}}/>
      <CategoryFilter categories={categories} selected={cat} onSelect={setCat}/>
      <div style={{maxHeight:300,overflowY:'auto',margin:'0 -24px',padding:'0 24px'}}>
        {Object.entries(grouped).length===0
          ?<div style={{textAlign:'center',color:'var(--tx3)',padding:'24px 0',fontSize:13}}>
            {q||cat?'No matches — try clearing the filter':'All items already added here'}
          </div>
          :Object.entries(grouped).map(([c,items])=>(
            <div key={c} style={{marginBottom:14}}>
              {!cat&&<div style={{fontSize:10,color:'var(--tx3)',textTransform:'uppercase',
                letterSpacing:1,fontWeight:600,marginBottom:4}}>{c}</div>}
              {items.map(({name,cat:ic,weight})=>(
                <button key={name} onClick={()=>pick(name,ic,weight)}
                  style={{display:'flex',alignItems:'center',width:'100%',
                    padding:'8px 10px',borderRadius:6,textAlign:'left',
                    fontSize:13,color:'var(--tx)',marginBottom:2,
                    background:'transparent',transition:'background .1s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--sf2)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <span style={{flex:1}}>{name}</span>
                  <span style={{fontSize:11,color:'var(--tx3)',marginRight:10}}>{fmtW(weight)}</span>
                  <span style={{color:'var(--tx3)',fontSize:15}}>+</span>
                </button>
              ))}
            </div>
          ))
        }
      </div>
    </>}

    {tab==='custom'&&<div>
      <div style={{fontSize:12,color:'var(--tx2)',marginBottom:8}}>
        Add a custom item to <b style={{color:'var(--tx)'}}>{locName}</b>. Weight defaults to 200g — you can edit it in the trip.
      </div>
      <input ref={cRef} value={customName} onChange={e=>setCustomName(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&pickCustom()}
        placeholder="E.g. Silk Pyjamas…"
        style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--bd)',
          borderRadius:7,padding:'9px 12px',color:'var(--tx)',outline:'none',marginBottom:12}}/>
      <button onClick={pickCustom} disabled={!customName.trim()}
        style={{width:'100%',padding:'10px',borderRadius:7,background:'var(--am)',
          color:'#1a0e00',fontWeight:700,fontSize:13,opacity:customName.trim()?1:.45}}>
        Add
      </button>
    </div>}

    <button onClick={onClose}
      style={{width:'100%',marginTop:14,padding:'9px',borderRadius:7,fontSize:13,
        fontWeight:600,background:'var(--sf3)',border:'1px solid var(--bd)',color:'var(--tx)'}}>
      {lastAdded?'Done':'Cancel'}
    </button>
  </Modal>;
}

/* ── TEMPLATE LOCATION PICKER ────────────────────────────────────── */
function TemplateLocationPicker({takenLocNames,onClose,onPick}){
  const [tab,setTab]=useState('pick');
  const [customName,setCustomName]=useState('');
  const cRef=useRef();
  useEffect(()=>{if(tab==='custom')cRef.current?.focus();},[tab]);

  const available=DEFAULT_LOCS
    .map(l=>l.name)
    .filter(name=>!takenLocNames.has(name.toLowerCase()));

  return <Modal title="Add Location" onClose={onClose} w={380}>
    <div style={{display:'flex',gap:6,marginBottom:16}}>
      {[['pick','Common Locations'],['custom','Custom']].map(([v,l])=>(
        <button key={v} onClick={()=>setTab(v)} style={{padding:'5px 14px',borderRadius:20,
          fontSize:12,fontWeight:600,border:'none',
          background:tab===v?'var(--am)':'var(--sf2)',color:tab===v?'#1a0e00':'var(--tx2)'}}>
          {l}
        </button>
      ))}
    </div>

    {tab==='pick'&&<div style={{display:'flex',flexDirection:'column',gap:6}}>
      {available.length===0
        ?<div style={{textAlign:'center',color:'var(--tx3)',padding:'16px 0',fontSize:13}}>
            All common locations already added — use Custom to add more.
          </div>
        :available.map(name=>(
          <button key={name} onClick={()=>onPick(name)}
            style={{display:'flex',alignItems:'center',padding:'11px 14px',borderRadius:8,
              background:'var(--sf2)',border:'1px solid var(--bd)',fontSize:14,fontWeight:600,
              textAlign:'left',color:'var(--tx)',transition:'border-color .12s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='var(--am)'}
            onMouseLeave={e=>e.currentTarget.style.borderColor='var(--bd)'}>
            <span style={{flex:1}}>{name}</span>
            <span style={{color:'var(--tx3)',fontSize:15}}>+</span>
          </button>
        ))
      }
    </div>}

    {tab==='custom'&&<div>
      <div style={{fontSize:12,color:'var(--tx2)',marginBottom:8}}>
        Type any location name, e.g. Hotel Safe, Day Bag, Bike Bag…
      </div>
      <input ref={cRef} value={customName} onChange={e=>setCustomName(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&customName.trim()&&onPick(customName.trim())}
        placeholder="Location name…"
        style={{width:'100%',background:'var(--sf2)',border:'1px solid var(--bd)',
          borderRadius:7,padding:'9px 12px',color:'var(--tx)',outline:'none',marginBottom:12}}/>
      <button onClick={()=>customName.trim()&&onPick(customName.trim())}
        disabled={!customName.trim()}
        style={{width:'100%',padding:'10px',borderRadius:7,background:'var(--am)',
          color:'#1a0e00',fontWeight:700,fontSize:13,opacity:customName.trim()?1:.45}}>
        Add Location
      </button>
    </div>}
  </Modal>;
}

/* ── TEMPLATE CARD ───────────────────────────────────────────────── */
function TemplateCard({tpl,trips,sort='personal',onRename,onRemoveItem,onUpdateQty,onAddItem,onDelete,onApplyToTrip,onCreateAndApply}){
  const [expanded,setExpanded]=useState(false);
  const [renaming,setRenaming]=useState(false);
  const [val,setVal]=useState('');
  const [pickingTrip,setPickingTrip]=useState(false);
  const [newTripName,setNewTripName]=useState('');
  const [creatingNew,setCreatingNew]=useState(false);
  const newTripRef=useRef();
  const iRef=useRef();
  const{ask:confirm,el:confirmEl}=useConfirm();
  const fmt=ts=>new Date(ts).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});

  const startRename=e=>{e.stopPropagation();setVal(tpl.name);setRenaming(true);};
  const saveRename=()=>{if(val.trim())onRename(val.trim());setRenaming(false);};
  useEffect(()=>{if(renaming)iRef.current?.focus();},[renaming]);
  useEffect(()=>{if(creatingNew)newTripRef.current?.focus();},[creatingNew]);

  const byLoc=tpl.assignments.reduce((acc,a,i)=>{
    const k=a.locationName;
    (acc[k]=acc[k]||[]).push({...a,_idx:i});
    return acc;
  },{});

  const handleApply=e=>{e.stopPropagation();setPickingTrip(true);setCreatingNew(false);setNewTripName('');};

  const [noTripsMsg,setNoTripsMsg]=useState(false);

  // Adding items: which location is currently open for adding
  const [adding,setAdding]=useState(null); // locName | null
  const [pickingLoc,setPickingLoc]=useState(false);

  return <>
    {confirmEl}
    <div style={{background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:10,overflow:'hidden'}}>

      {/* Header row */}
      <div style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}
        onClick={()=>setExpanded(x=>!x)}>
        <div style={{flex:1,minWidth:0}}>
          {renaming
            ?<div style={{display:'flex',gap:8}} onClick={e=>e.stopPropagation()}>
                <input ref={iRef} value={val} onChange={e=>setVal(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')saveRename();if(e.key==='Escape')setRenaming(false);}}
                  onBlur={saveRename}
                  style={{flex:1,background:'var(--sf2)',border:'1px solid var(--am)',borderRadius:6,
                    padding:'4px 9px',color:'var(--tx)',outline:'none',fontSize:14,fontWeight:700}}/>
              </div>
            :<div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{fontWeight:700,fontSize:15,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {tpl.name}
                </div>
                <button onClick={startRename}
                  style={{fontSize:12,color:'var(--tx3)',padding:'2px 5px',borderRadius:4,flexShrink:0}}
                  onMouseEnter={e=>e.currentTarget.style.color='var(--am)'}
                  onMouseLeave={e=>e.currentTarget.style.color='var(--tx3)'}>✎</button>
              </div>
          }
          <div style={{fontSize:11,color:'var(--tx3)',marginTop:3}}>
            {tpl.assignments.length} item{tpl.assignments.length!==1?'s':''} across {Object.keys(byLoc).length} location{Object.keys(byLoc).length!==1?'s':''} · {fmt(tpl.createdAt)}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
          <button onClick={handleApply}
            style={{padding:'6px 14px',borderRadius:7,fontSize:12,fontWeight:700,
              background:'var(--am)',color:'#1a0e00',border:'none'}}>
            Apply
          </button>
          {noTripsMsg&&<span style={{fontSize:10,color:'var(--rd)',whiteSpace:'nowrap'}}>Create a trip first</span>}
        </div>
        <button onClick={e=>{e.stopPropagation();confirm(`Delete template "${tpl.name}"?`,onDelete);}}
          style={{color:'var(--tx3)',fontSize:15,padding:'4px 8px',borderRadius:5,flexShrink:0}}
          onMouseEnter={e=>e.currentTarget.style.color='var(--rd)'}
          onMouseLeave={e=>e.currentTarget.style.color='var(--tx3)'}>✕</button>
        <span style={{color:'var(--tx3)',fontSize:12,flexShrink:0}}>{expanded?'▲':'▼'}</span>
      </div>

      {/* Expanded / edit view */}
      {expanded&&<div style={{borderTop:'1px solid var(--bd)',padding:'12px 16px',
        display:'flex',flexDirection:'column',gap:14}}>

        {Object.entries(byLoc).map(([locName,items])=>{
          const sortedItems = sort==='personal' ? items : [...items].sort((a,b)=>{
            if(sort==='az') return a.itemName.localeCompare(b.itemName);
            if(sort==='za') return b.itemName.localeCompare(a.itemName);
            if(sort==='asc') return (a.itemWeight??200)-(b.itemWeight??200);
            if(sort==='desc') return (b.itemWeight??200)-(a.itemWeight??200);
            return 0;
          });
          return (<div key={locName}>
            <div style={{fontSize:10,color:'var(--tx3)',textTransform:'uppercase',
              letterSpacing:1,fontWeight:600,marginBottom:6}}>{locName}</div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {sortedItems.map(a=>(
                <div key={a._idx} style={{display:'flex',alignItems:'center',gap:8,
                  padding:'6px 10px',background:'var(--sf2)',borderRadius:7}}>
                  <span style={{flex:1,fontSize:13}}>{a.itemName}</span>
                  {/* Qty controls */}
                  <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                    <button onClick={()=>a.quantity>1?onUpdateQty(a._idx,a.quantity-1):onRemoveItem(a._idx)}
                      style={{width:22,height:22,borderRadius:4,background:'var(--sf3)',fontSize:15,
                        display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                    <span style={{width:20,textAlign:'center',fontSize:13,fontWeight:600}}>{a.quantity}</span>
                    <button onClick={()=>onUpdateQty(a._idx,a.quantity+1)}
                      style={{width:22,height:22,borderRadius:4,background:'var(--sf3)',fontSize:15,
                        display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                  </div>
                  <button onClick={()=>onRemoveItem(a._idx)}
                    style={{color:'var(--tx3)',fontSize:13,padding:'2px 6px',borderRadius:4,flexShrink:0}}
                    onMouseEnter={e=>e.currentTarget.style.color='var(--rd)'}
                    onMouseLeave={e=>e.currentTarget.style.color='var(--tx3)'}>✕</button>
                </div>
              ))}

              {/* Add item button for this location */}
              <button onClick={e=>{e.stopPropagation();setAdding(locName);}}
                style={{marginTop:4,width:'100%',padding:'5px',borderRadius:6,fontSize:12,
                  border:'1px dashed var(--bd)',color:'var(--tx3)',display:'flex',
                  alignItems:'center',justifyContent:'center',gap:4}}>
                <span style={{fontSize:14}}>+</span> Add item to {locName}
              </button>
            </div>
          </div>
          );
        })}

        {/* Add a new location to template */}
        <button onClick={e=>{e.stopPropagation();setPickingLoc(true);}}
          style={{padding:'7px',borderRadius:7,fontSize:12,border:'1px dashed var(--bd)',
            color:'var(--tx3)',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
          <span style={{fontSize:14}}>+</span> Add new location
        </button>

        {tpl.assignments.length===0&&<div style={{fontSize:13,color:'var(--tx3)',
          textAlign:'center',padding:'8px 0'}}>No items — add some or delete this template.</div>}
      </div>}
    </div>

    {/* Template location picker modal */}
    {pickingLoc&&<TemplateLocationPicker
      takenLocNames={new Set(tpl.assignments.map(a=>a.locationName.toLowerCase()))}
      onClose={()=>setPickingLoc(false)}
      onPick={name=>{setPickingLoc(false);setAdding(name);}}
    />}

    {/* Template item picker modal */}
    {adding&&<TemplateItemPicker
      locName={adding}
      takenNames={new Set(tpl.assignments.filter(a=>a.locationName===adding).map(a=>a.itemName.toLowerCase()))}
      onClose={()=>setAdding(null)}
      onAdd={a=>onAddItem(a)}
    />}

    {/* Trip picker when applying from home */}
    {pickingTrip&&<>
      <Veil onClick={()=>setPickingTrip(false)}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
        width:360,maxWidth:'94vw',background:'var(--sf)',border:'1px solid var(--bd)',
        borderRadius:12,padding:24,zIndex:201,boxShadow:'0 24px 64px rgba(0,0,0,.65)',
        animation:'fdModal .2s ease'}}>
        <div className="bb" style={{fontSize:20,color:'var(--am)',marginBottom:16}}>Apply to which trip?</div>

        {/* Create new trip option */}
        <div style={{marginBottom:trips.length>0?16:0}}>
          {creatingNew
            ?<div style={{display:'flex',gap:8}}>
                <input ref={newTripRef} value={newTripName} onChange={e=>setNewTripName(e.target.value)}
                  onKeyDown={e=>{
                    if(e.key==='Enter'&&newTripName.trim()){onCreateAndApply(newTripName.trim());setPickingTrip(false);}
                    if(e.key==='Escape')setCreatingNew(false);
                  }}
                  placeholder="Trip name…"
                  style={{flex:1,background:'var(--sf2)',border:'1px solid var(--am)',borderRadius:7,
                    padding:'9px 12px',color:'var(--tx)',outline:'none',fontSize:14}}/>
                <button
                  onClick={()=>{if(newTripName.trim()){onCreateAndApply(newTripName.trim());setPickingTrip(false);}}}
                  disabled={!newTripName.trim()}
                  style={{padding:'9px 14px',borderRadius:7,background:'var(--am)',color:'#1a0e00',
                    fontWeight:700,fontSize:13,opacity:newTripName.trim()?1:.45}}>
                  Create
                </button>
                <button onClick={()=>setCreatingNew(false)}
                  style={{color:'var(--tx3)',fontSize:18,padding:'4px 8px',borderRadius:6}}>✕</button>
              </div>
            :<button onClick={()=>setCreatingNew(true)}
                style={{width:'100%',padding:'10px 14px',borderRadius:8,textAlign:'left',
                  background:'var(--am-bg)',border:'1px solid var(--am)',fontSize:14,
                  fontWeight:600,color:'var(--am)'}}>
                + Create New Trip
              </button>
          }
        </div>

        {/* Existing trips */}
        {trips.length>0&&<>
          <div style={{fontSize:11,color:'var(--tx3)',textTransform:'uppercase',
            letterSpacing:.8,marginBottom:8}}>or apply to existing</div>
          <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:240,overflowY:'auto'}}>
            {trips.slice().sort((a,b)=>b.createdAt-a.createdAt).map(t=>(
              <button key={t.id} onClick={()=>{onApplyToTrip(t.id);setPickingTrip(false);}}
                style={{padding:'10px 14px',borderRadius:8,background:'var(--sf2)',
                  border:'1px solid var(--bd)',fontSize:14,fontWeight:600,textAlign:'left',
                  color:'var(--tx)',transition:'border-color .12s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--am)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--bd)'}>
                {t.name}
              </button>
            ))}
          </div>
        </>}

        <button onClick={()=>setPickingTrip(false)}
          style={{marginTop:14,width:'100%',padding:'8px',borderRadius:7,
            background:'transparent',border:'1px solid var(--bd)',fontSize:13,color:'var(--tx3)'}}>
          Cancel
        </button>
      </div>
    </>}
  </>;
}

function HomeScreen({trips,templates,onCreate,onSelect,onDelete,onRename,onDuplicate,onDeleteTemplate,
  onRenameTemplate,onRemoveTemplateItem,onUpdateTemplateItemQty,onAddTemplateItem,onApplyTemplateToTrip,
  onCreateTripAndApply,onCreateTemplate}){

      </div>
      <div style={{fontSize:14,color:'var(--tx2)',marginBottom:28,letterSpacing:.3}}>
        Smart packing for smarter travellers
      </div>

      {/* New trip box */}
      <div style={{background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:10,
        padding:'18px 20px',marginBottom:28}}>
